<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" role="img" aria-label="Schicgirl — Natural hair picks for Type 4, sorted by porosity">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdf6ee"/>
      <stop offset="0.5" stop-color="#f6e7cf"/>
      <stop offset="1" stop-color="#e8b4a0"/>
    </linearGradient>
    <linearGradient id="pgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9934a"/>
      <stop offset="1" stop-color="#a06d28"/>
    </linearGradient>
    <radialGradient id="pglow" cx="0.25" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="440" fill="url(#pbg)"/>
  <rect width="1200" height="440" fill="url(#pglow)"/>

  <!-- decorative swirls -->
  <g fill="none" stroke="#c9934a" stroke-opacity="0.2" stroke-width="7" stroke-linecap="round">
    <path d="M60 360 q44 -38 88 0 q44 38 88 0"/>
    <path d="M980 80 q44 -38 88 0 q44 38 88 0"/>
  </g>

  <!-- text block -->
  <text x="90" y="150" font-family="Jost, Helvetica, Arial, sans-serif" font-size="22" letter-spacing="8" font-weight="600" fill="#a06d28">SCHICGIRL · CURATED PICKS</text>
  <text x="86" y="248" font-family="'Cormorant Garamond', Georgia, serif" font-size="78" font-weight="600" fill="#2d1a0e">Natural hair, <tspan font-style="italic" fill="#a06d28">made simple</tspan></text>
  <text x="90" y="300" font-family="Jost, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#5a3a22">Trusted finds for Type 4 hair — sorted by porosity · 4A 4B 4C</text>
  <g transform="translate(90 340)">
    <rect x="0" y="0" width="240" height="44" rx="22" fill="url(#pgold)"/>
    <text x="120" y="28" text-anchor="middle" font-family="Jost, Helvetica, Arial, sans-serif" font-size="15" letter-spacing="2" font-weight="700" fill="#fff">PRODUITS · DIY · POROSITÉ</text>
  </g>

  <!-- product bottles motif -->
  <g transform="translate(880 110)">
    <!-- pump bottle -->
    <g transform="translate(0 40)">
      <rect x="26" y="-30" width="14" height="22" rx="4" fill="#a06d28"/>
      <rect x="16" y="-16" width="14" height="6" rx="3" fill="#a06d28"/>
      <rect x="24" y="-10" width="20" height="12" rx="3" fill="#8a5a1d"/>
      <rect x="8" y="2" width="52" height="150" rx="16" fill="#c9934a"/>
      <rect x="16" y="44" width="36" height="70" rx="8" fill="#fffaf2" fill-opacity="0.92"/>
    </g>
    <!-- jar -->
    <g transform="translate(96 90)">
      <ellipse cx="46" cy="8" rx="46" ry="12" fill="#a06d28"/>
      <rect x="0" y="8" width="92" height="22" fill="#a06d28"/>
      <rect x="4" y="30" width="84" height="78" rx="10" fill="#e8b4a0"/>
      <rect x="14" y="52" width="64" height="44" rx="8" fill="#fffaf2" fill-opacity="0.92"/>
    </g>
    <!-- dropper -->
    <g transform="translate(206 24)">
      <rect x="14" y="-12" width="24" height="20" rx="4" fill="#2d1a0e"/>
      <rect x="22" y="8" width="8" height="20" fill="#8a5a1d"/>
      <path d="M6 28 h40 v118 a16 16 0 0 1 -16 16 h-8 a16 16 0 0 1 -16 -16 z" fill="#2a2622"/>
      <rect x="12" y="60" width="28" height="60" rx="6" fill="#c9934a" fill-opacity="0.5"/>
    </g>
  </g>
</svg>
