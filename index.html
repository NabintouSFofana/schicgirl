    <style>
      :root {
        --bg: #fbf6ef; --card: #ffffff; --ink: #2a1a0f; --ink-soft: #6b4a30;
        --muted: rgba(42, 26, 15, 0.66); --faint: rgba(42, 26, 15, 0.5);
        --gold: #c9934a; --gold-deep: #a86d23; --gold-lt: #e8c07e; --gold-pale: #f6ead4;
        --rose: #e8b4a0; --line: #d6cdbf; --line-gold: rgba(201, 147, 74, 0.45);
        --serif: "Cormorant Garamond", Georgia, serif; --sans: "Jost", system-ui, -apple-system, sans-serif;
        --r: 18px;
        --shadow-s: 0 1px 3px rgba(60, 38, 24, 0.09), 0 6px 16px -6px rgba(60, 38, 24, 0.2);
        --shadow: 0 2px 6px rgba(60, 38, 24, 0.1), 0 18px 36px -16px rgba(60, 38, 24, 0.26);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--sans); color: var(--ink);
        background: radial-gradient(ellipse 100% 40% at 50% -10%, rgba(232, 180, 160, 0.25), transparent 60%), linear-gradient(180deg, #fdf9f3, #f7efe4);
        background-attachment: fixed; min-height: 100vh; padding: 0 0 40px;
        -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
      }
      img { display: block; max-width: 100%; -webkit-user-drag: none; }
      a { text-decoration: none; color: inherit; }
      a:focus-visible, button:focus-visible { outline: 2px solid var(--gold-deep); outline-offset: 2px; border-radius: 6px; }
      #schicgirlWrap { display: none; }

      /* Entrance reveal (premium load animation) */
      @keyframes sgFadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
      @media (prefers-reduced-motion: no-preference) {
        .sg-reveal > * { animation: sgFadeUp 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) both; }
        .sg-reveal > *:nth-child(1) { animation-delay: 0s; }
        .sg-reveal > *:nth-child(2) { animation-delay: .05s; }
        .sg-reveal > *:nth-child(3) { animation-delay: .10s; }
        .sg-reveal > *:nth-child(4) { animation-delay: .15s; }
        .sg-reveal > *:nth-child(5) { animation-delay: .20s; }
        .sg-reveal > *:nth-child(6) { animation-delay: .25s; }
        .sg-reveal > *:nth-child(7) { animation-delay: .30s; }
        .sg-reveal > *:nth-child(8) { animation-delay: .34s; }
        .sg-reveal > *:nth-child(n+9) { animation-delay: .38s; }
      }

      .ss-top {
        position: relative; z-index: 50; display: flex; justify-content: flex-end; padding: 10px 18px;
        background: rgba(251, 246, 239, 0.72); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line);
      }
      .ss-lang { display: flex; background: rgba(201, 147, 74, 0.1); border-radius: 100px; padding: 3px; gap: 2px; }
      .ss-lang button {
        border: none; background: transparent; cursor: pointer; font-family: var(--sans); font-size: 12px;
        font-weight: 600; letter-spacing: 0.04em; color: var(--muted); padding: 9px 16px; border-radius: 100px; transition: all 0.2s;
      }
      .ss-lang button.on { background: var(--gold); color: #fff; box-shadow: 0 2px 8px rgba(201, 147, 74, 0.35); }

      .ss-wrap { max-width: 560px; margin: 0 auto; padding: 0 20px; }

      /* Quick jump-nav (sticky chips) */
      .ss-nav {
        position: sticky; top: 0; z-index: 40; display: flex; gap: 6px; overflow-x: auto;
        padding: 9px 20px; margin: 4px -20px 2px; background: rgba(251, 246, 239, 0.85);
        backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); scrollbar-width: none;
      }
      .ss-nav::-webkit-scrollbar { display: none; }
      .ss-nav a {
        flex: 1 1 0; min-width: 0; text-align: center; font-size: 11.5px; font-weight: 600; color: var(--gold-deep);
        background: rgba(201, 147, 74, 0.1); border: 1px solid var(--line-gold);
        padding: 10px 6px; border-radius: 100px; white-space: nowrap; transition: background 0.2s, color 0.2s;
      }
      .ss-nav a:hover { background: var(--gold); color: #fff; }
      .ss-label { scroll-margin-top: 64px; }

      .ss-profile { text-align: center; padding: 40px 0 20px; }
      .ss-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--line-gold), transparent); margin: 0 0 8px; }
      /* Tap feedback (mobile affordance — confirms the block is clickable) */
      .ss-product:active, .ss-pick3:active, .ss-link:active, .ss-free:active, .ss-social:active, .ss-seeall:active { transform: scale(0.98); }
      .ss-avatar {
        width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 16px; padding: 4px;
        background: linear-gradient(135deg, var(--gold-lt), var(--rose)); box-shadow: var(--shadow-s);
      }
      .ss-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #fff; }
      .ss-name { font-family: var(--serif); font-size: 40px; font-weight: 500; line-height: 1; letter-spacing: 0.005em; color: var(--ink); }
      .ss-name span { color: var(--gold-deep); font-style: italic; font-weight: 600; }
      .ss-proof {
        display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11px; font-weight: 600;
        letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-deep);
      }
      .ss-proof::before { content: "✦"; color: var(--gold); }
      .ss-bio { font-family: var(--serif); font-size: 18px; font-style: italic; color: var(--ink-soft); line-height: 1.6; letter-spacing: 0.01em; max-width: 320px; margin: 11px auto 0; }
      .ss-trust { display: inline-flex; align-items: center; gap: 9px; margin-top: 16px; font-size: 12.5px; font-weight: 600; color: var(--ink); }
      .ss-trust .stars { color: var(--gold); letter-spacing: 1px; }
      .ss-trust .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--line-gold); }
      .ss-trust .muted { color: var(--muted); font-weight: 500; }
      .ss-socials { display: flex; justify-content: center; gap: 10px; margin-top: 18px; }
      .ss-social {
        width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        background: var(--card); border: 1.5px solid var(--line); box-shadow: var(--shadow-s); color: var(--gold-deep);
        font-size: 18px; transition: transform 0.2s, box-shadow 0.2s;
      }
      .ss-social:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
      .ss-social svg { display: block; }

      .ss-label {
        display: flex; align-items: center; gap: 10px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.2em;
        text-transform: uppercase; color: var(--gold-deep); margin: 32px 2px 14px;
      }
      .ss-label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--line-gold), transparent); }

      .ss-free {
        display: block; background: linear-gradient(135deg, rgba(232, 180, 160, 0.18), #fffdf9);
        border: 1.5px solid var(--line-gold); border-radius: var(--r); padding: 20px; box-shadow: var(--shadow-s);
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .ss-free:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-style: solid; }
      .ss-free-top { display: flex; align-items: center; gap: 14px; }
      .ss-free-icon {
        width: 50px; height: 50px; border-radius: 15px; flex-shrink: 0; font-size: 24px;
        display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--rose), var(--gold-lt));
      }
      .ss-free-tag { font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rose); }
      .ss-free-title { font-size: 16px; font-weight: 700; line-height: 1.25; margin-top: 2px; }
      .ss-free-sub { font-size: 13px; color: var(--muted); line-height: 1.45; margin-top: 5px; }
      .ss-free-btn {
        display: block; text-align: center; margin-top: 16px; background: var(--gold); color: #fff; font-size: 13px;
        font-weight: 700; letter-spacing: 0.03em; padding: 13px; border-radius: 12px; box-shadow: 0 6px 16px rgba(201, 147, 74, 0.32); transition: filter 0.2s;
      }
      .ss-free:hover .ss-free-btn { filter: brightness(1.06); }

      /* Le Cercle — membership banner (recurring subscription, visually distinct) */
      .ss-cercle {
        display: block; position: relative; overflow: hidden;
        background: linear-gradient(150deg, #3b2a20 0%, #4a3020 55%, #5a3a20 100%);
        border: 1.5px solid var(--gold); border-radius: var(--r); padding: 22px 20px;
        box-shadow: 0 10px 30px -10px rgba(60, 38, 24, 0.5); transition: transform 0.2s, box-shadow 0.2s;
      }
      .ss-cercle:hover { transform: translateY(-2px); box-shadow: 0 16px 40px -12px rgba(60, 38, 24, 0.6); }
      .ss-cercle::after { content: ""; position: absolute; top: -40%; right: -20%; width: 260px; height: 260px;
        background: radial-gradient(circle, rgba(232, 180, 160, 0.35), transparent 70%); pointer-events: none; }
      .ss-cercle-tag {
        display: inline-block; font-size: 9.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
        color: #2a1a0f; background: linear-gradient(135deg, var(--gold-lt), var(--rose)); padding: 5px 11px; border-radius: 100px;
      }
      .ss-cercle-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
      .ss-cercle-title { font-family: var(--serif); font-size: 30px; font-weight: 600; color: #fff; line-height: 1; }
      .ss-cercle-price { display: flex; align-items: baseline; gap: 3px; white-space: nowrap; }
      .ss-cercle-price .amt { font-family: var(--serif); font-size: 32px; font-weight: 600; color: var(--gold-lt); line-height: 1; }
      .ss-cercle-price .per { font-size: 14px; font-weight: 600; color: rgba(255, 255, 255, 0.75); }
      .ss-cercle-sub { font-size: 13.5px; color: rgba(255, 245, 235, 0.82); line-height: 1.5; margin-top: 10px; }
      .ss-cercle-perks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
      .ss-cercle-perks span {
        font-size: 11.5px; font-weight: 600; color: #f6ead4; background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(232, 192, 126, 0.4); padding: 6px 11px; border-radius: 100px;
      }
      .ss-cercle-btn {
        display: block; text-align: center; margin-top: 16px; background: linear-gradient(135deg, var(--gold-lt), var(--gold));
        color: #2a1a0f; font-size: 14.5px; font-weight: 700; letter-spacing: 0.02em; padding: 14px; border-radius: 12px;
        box-shadow: 0 6px 18px rgba(201, 147, 74, 0.4); transition: filter 0.2s;
      }
      .ss-cercle:hover .ss-cercle-btn { filter: brightness(1.07); }
      .ss-cercle-note { text-align: center; font-size: 11px; color: rgba(255, 245, 235, 0.6); margin-top: 9px; }

      .ss-intro { font-size: 14px; line-height: 1.62; color: var(--ink-soft); margin: 2px 2px 20px; }
      .ss-intro p { margin: 0 0 11px; }
      .ss-intro p:last-child { margin-bottom: 0; }
      .ss-intro b { color: var(--gold-deep); font-weight: 700; }
      .ss-articles { display: flex; flex-direction: column; gap: 10px; }
      .ss-article { display: flex; gap: 0; align-items: stretch; background: var(--card); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; text-decoration: none; color: inherit; transition: box-shadow .15s ease, transform .15s ease; }
      .ss-article:hover { box-shadow: 0 10px 24px -14px rgba(60, 38, 24, 0.35); transform: translateY(-1px); }
      .ss-article-media { flex: 0 0 96px; background: var(--gold-pale); font-size: 26px; display: flex; align-items: center; justify-content: center; }
      .ss-article-media img { width: 96px; height: 100%; min-height: 92px; object-fit: cover; display: block; }
      .ss-article-body { padding: 11px 13px; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
      .ss-article-title { font-family: var(--serif); font-size: 16px; font-weight: 600; color: var(--ink); line-height: 1.24; }
      .ss-article-exc { font-size: 12px; color: var(--muted); line-height: 1.42; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .ss-article-read { font-size: 10.5px; letter-spacing: .02em; color: var(--gold-deep); font-weight: 600; margin-top: 3px; }
      .ss-shopcta { display: flex; align-items: center; gap: 12px; margin: 4px 0 6px; padding: 16px 18px; text-decoration: none;
        background: linear-gradient(135deg, var(--gold-pale), #fffdf8); border: 2px solid var(--gold); border-radius: 16px;
        box-shadow: 0 8px 26px rgba(201, 147, 74, 0.30); transition: box-shadow .15s ease, transform .15s ease; }
      .ss-shopcta:hover { box-shadow: 0 12px 30px rgba(201, 147, 74, 0.42); transform: translateY(-1px); }
      .ss-shopcta-emoji { font-size: 26px; flex: 0 0 auto; }
      .ss-shopcta-txt { display: flex; flex-direction: column; line-height: 1.3; color: var(--ink-soft); font-size: 12.5px; flex: 1 1 auto; }
      .ss-shopcta-txt b { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--gold-deep); }
      .ss-shopcta-arrow { font-size: 20px; color: var(--gold-deep); flex: 0 0 auto; }
      .ss-products { display: flex; flex-direction: column; gap: 9px; }
      .ss-product {
        display: flex; gap: 13px; align-items: center; background: var(--card); border: 1.5px solid var(--line);
        border-radius: 15px; padding: 10px 13px; box-shadow: var(--shadow-s); transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      }
      .ss-product:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--line-gold); }
      .ss-product-media {
        position: relative; width: 54px; flex-shrink: 0; aspect-ratio: 3 / 4; border-radius: 10px; overflow: hidden;
        background: linear-gradient(135deg, var(--gold-pale), rgba(201, 147, 74, 0.25)); display: flex; align-items: center; justify-content: center;
        font-size: 28px; color: var(--gold);
      }
      .ss-product-media img { width: 100%; height: 100%; object-fit: cover; }
      .ss-product-badge {
        position: absolute; top: 6px; left: 6px; font-size: 8px; font-weight: 700; letter-spacing: 0.06em;
        text-transform: uppercase; color: #3a2412; background: var(--gold-lt); padding: 3px 7px; border-radius: 100px;
      }
      .ss-product-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      .ss-product-title { font-size: 16px; font-weight: 700; line-height: 1.2; }
      .ss-product-desc {
        font-size: 12.5px; color: var(--muted); line-height: 1.4; margin-top: 4px;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      }
      .ss-product-bonus {
        font-size: 11px; font-weight: 600; color: var(--gold-deep); line-height: 1.35; margin-top: 5px;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      }
      .ss-product-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 5px; }
      .ss-product-price { display: flex; align-items: baseline; gap: 6px; }
      .ss-product-price .amt { font-family: var(--serif); font-size: 22px; font-weight: 600; color: var(--gold-deep); line-height: 1; }
      .ss-product-price .cfa { font-size: 10px; font-weight: 500; color: var(--faint); }
      /* Featured flagship card (Le Studio · Planner) — distinct colour, thicker border, visible shadow */
      .ss-product.feat {
        background: linear-gradient(135deg, var(--gold-pale), #fffdf8);
        border: 2px solid var(--gold);
        box-shadow: 0 8px 26px rgba(201, 147, 74, 0.38), 0 2px 6px rgba(60, 38, 24, 0.12);
      }
      .ss-product.feat .ss-product-title { color: var(--ink); }
      .ss-product.feat .ss-product-price .amt { color: var(--gold-deep); }

      /* Amazon picks — 3 aligned horizontal blocks */
      .ss-picks3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .ss-pick3 {
        display: flex; flex-direction: column; align-items: center; text-align: center;
        background: var(--card); border: 1.5px solid var(--line); border-radius: 14px;
        padding: 10px 8px; box-shadow: var(--shadow-s); transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      }
      .ss-pick3:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--line-gold); }
      .ss-pick3-media {
        width: 100%; aspect-ratio: 1 / 1; border-radius: 10px; overflow: hidden; margin-bottom: 8px;

      }
      .ss-pick3-media img { width: 100%; height: 100%; object-fit: cover; }

          { stars: 5, author: "Fatoumata D.", text_fr: "J'ai enfin compris ma porosité. Tout fait sens maintenant !", text_en: "Finally understood my porosity. Everything clicked!" },
          { stars: 5, author: "Awa K.", text_fr: "Première fois que ma routine tient toute la semaine. Merci !", text_en: "First time my routine holds all week. Thank you!" },
          { stars: 5, author: "Miriam L.", text_fr: "Des conseils personnalisés qui marchent vraiment. Mes cheveux n'ont jamais été aussi beaux.", text_en: "Personalised advice that actually works. My hair has never been better." },
          { stars: 5, author: "Anita P.", text_fr: "Outils révolutionnaires. Mes cheveux naturels s'épanouissent !", text_en: "Game-changing tools. My natural hair is thriving!" },
          { stars: 5, author: "Khadija B.", text_fr: "Mes longueurs ne cassent plus. J'ai retrouvé confiance en mes cheveux.", text_en: "My ends stopped breaking. I've got my confidence back." },
          { stars: 5, author: "Aïcha N.", text_fr: "Des explications claires, et en français ! Enfin quelqu'un qui comprend nos cheveux.", text_en: "Clear explanations, and in French! Finally someone who understands our hair." },
        ],
        disc_fr: "En tant qu'associée Amazon, je gagne des revenus grâce aux achats éligibles.",
        disc_en: "As an Amazon Associate I earn from qualifying purchases.",
      };

      let LANG = "fr";
      try { const s = localStorage.getItem("sg_lang"); if (s === "fr" || s === "en") LANG = s; } catch (e) {}
      const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      const tx = (o, k) => o[k + "_" + LANG] || o[k + "_fr"] || o[k] || "";
      function safeUrl(u) {
        const s = String(u || "").trim();
        if (!s) return "#";
        if (s[0] === "#" || s[0] === "/" || /^(https?:|mailto:|tel:)/i.test(s)) return s;
        if (!/^[a-z][a-z0-9+.\-]*:/i.test(s)) return s;
        return "#";
      }
      function track(value) {
        try {
          const d = JSON.parse(localStorage.getItem("schicgirl_analytics") || '{"visits":[],"clicks":[]}');
          d.clicks.unshift({ ts: Date.now(), value });
          if (d.clicks.length > 1200) d.clicks.length = 1200;
          localStorage.setItem("schicgirl_analytics", JSON.stringify(d));
        } catch (e) {}
      }

      function render() {
        const ext = (u) => /^(https?:|mailto:)/i.test(u) ? ' target="_blank" rel="noopener noreferrer"' : "";

        const socials = SITE.socials.map((s) =>
          `<a class="ss-social" href="${esc(safeUrl(s.url))}"${ext(s.url)} aria-label="${esc(s.label)}" onclick="track('social-${esc(s.id)}')">${s.svg || esc(s.icon)}</a>`
        ).join("");

        const profile = `
          <section class="ss-profile">
            <div class="ss-avatar"><img src="${esc(SITE.logo)}" alt="Schicgirl" onerror="this.style.display='none'"/></div>
            <h1 class="ss-name">${esc(SITE.name_pre)}<span>${esc(SITE.name_acc)}</span></h1>
            <div class="ss-proof">${esc(tx(SITE, "proof"))}</div>
            <p class="ss-bio">${esc(tx(SITE, "bio"))}</p>
            <div class="ss-socials">${socials}</div>
          </section>`;

        const f = SITE.free;
        const free = `
          <a class="ss-free" href="${esc(safeUrl(f.url))}"${ext(f.url)} onclick="track('free-kit-${LANG}')">
            <div class="ss-free-top">
              <div class="ss-free-icon">${esc(f.emoji)}</div>
              <div>
                <div class="ss-free-tag">${esc(tx(f, "tag"))}</div>
                <div class="ss-free-title">${esc(tx(f, "title"))}</div>
                <div class="ss-free-sub">${esc(tx(f, "sub"))}</div>
              </div>
            </div>
            <span class="ss-free-btn">${esc(tx(f, "cta"))} ↓</span>
          </a>`;

        const c = SITE.cercle;
        const cercleUrl = LANG === "fr" ? (c.url_fr || c.url_en) : (c.url_en || c.url_fr);
        const cerclePerks = (LANG === "fr" ? c.perks_fr : c.perks_en).map((p) => `<span>${esc(p)}</span>`).join("");
        const cercle = `
          <a class="ss-cercle" href="${esc(safeUrl(cercleUrl))}" onclick="track('cercle-${LANG}')">
            <span class="ss-cercle-tag">${esc(tx(c, "tag"))}</span>
            <div class="ss-cercle-head">
              <div class="ss-cercle-title">${esc(tx(c, "title"))} 🤍</div>
              <div class="ss-cercle-price"><span class="amt">${esc(tx(c, "price"))}</span><span class="per">${esc(tx(c, "per"))}</span></div>
            </div>
            <div class="ss-cercle-sub">${esc(tx(c, "sub"))}</div>
            <div class="ss-cercle-perks">${cerclePerks}</div>
            <span class="ss-cercle-btn">${esc(tx(c, "cta"))} →</span>
            <div class="ss-cercle-note">${esc(tx(c, "note"))}</div>
          </a>`;

        const products = SITE.products.slice(0, 4).map((p, i) => {
          const img = tx(p, "img");
          const imgv = img ? img + (img.indexOf("?") < 0 ? "?v=20260715b" : "") : "";
          const media = img ? `<img src="${esc(imgv)}" alt="${esc(tx(p, "title"))}" loading="lazy" onerror="this.parentElement.textContent='📖'"/>` : "📖";
          const badge = tx(p, "badge");
          const desc = tx(p, "desc");
          const bonus = tx(p, "bonus");
          const cfa = LANG === "fr" && p.cfa ? `<span class="cfa">${esc(p.cfa)}</span>` : "";
          const url = LANG === "fr" ? p.url_fr || p.url_en : p.url_en || p.url_fr;
          const feat = (i === 0) ? " feat" : "";
          return `
            <a class="ss-product${feat}" href="${esc(safeUrl(url))}" onclick="track('product-${esc(p.id)}')">
              <div class="ss-product-media">${media}${badge ? `<span class="ss-product-badge">${esc(badge)}</span>` : ""}</div>
              <div class="ss-product-body">
                <div class="ss-product-title">${esc(tx(p, "title"))}</div>
                ${desc ? `<div class="ss-product-desc">${esc(desc)}</div>` : ""}
                ${bonus ? `<div class="ss-product-bonus">${esc(bonus)}</div>` : ""}
                <div class="ss-product-foot">
                  <div class="ss-product-price"><span class="amt">${esc(tx(p, "price"))}</span>${cfa}</div>
                </div>
              </div>
            </a>`;
        }).join("");
        const seeall = `<a class="ss-seeall" href="${esc(safeUrl(SITE.seeall_url))}" target="_blank" rel="noopener noreferrer" onclick="track('see-all-guides')">${esc(tx(SITE, "seeall"))}</a>`;

        const linkRow = (it, prefix) => {
          const ic = it.img
            ? `<span class="ss-link-icon"><img src="${esc(it.img)}" alt="" onerror="this.parentElement.textContent='🔗'"/></span>`
            : `<span class="ss-link-icon">${esc(it.icon || "🔗")}</span>`;
          return `
            <a class="ss-link" href="${esc(safeUrl(it.url))}"${ext(it.url)} onclick="track('${prefix}-${esc(it.id)}')">
              ${ic}
              <div class="ss-link-body">
                <div class="ss-link-title">${esc(tx(it, "title"))}</div>
                <div class="ss-link-sub">${esc(tx(it, "sub"))}</div>
              </div>
            </a>`;
        };
        const tools = SITE.tools.map((t) => linkRow(t, "tool")).join("");
        const picks = SITE.picks.map((p) => {
          const ic = p.img
            ? `<span class="ss-pick3-media"><img src="${esc(p.img)}" alt="" onerror="this.parentElement.textContent='🛍️'"/></span>`
            : `<span class="ss-pick3-media">${esc(p.icon || "🛍️")}</span>`;
          return `
            <a class="ss-pick3" href="${esc(safeUrl(p.url))}"${ext(p.url)} onclick="track('pick-${esc(p.id)}')">
              ${ic}
              <span class="ss-pick3-name">${esc(tx(p, "title"))}</span>
            </a>`;
        }).join("");

        const testiCard = (stars, text, author, photo) => `
          <div class="ss-testi">
            ${photo ? `<img class="ss-testi-photo" src="${esc(photo)}" alt="${esc(author || "")}" loading="lazy" onerror="this.style.display='none'"/>` : ""}
            <div class="ss-testi-stars">${"★".repeat(Math.max(0, Math.min(5, stars || 5)))}</div>
            <div class="ss-testi-text">${esc(text)}</div>
            <div class="ss-testi-author">— ${esc(author || "")}</div>
          </div>`;
        const testis =
          SITE.testimonials.map((t) => testiCard(t.stars, tx(t, "text"), t.author)).join("") +
          (SB_REVIEWS || []).map((r) => testiCard(r.rating, r.text, r.author, r.photo_url)).join("");
        const reviewCta = `<div style="text-align:center;margin-top:14px"><a class="ss-seeall" href="${REVIEW_PAGE}" target="_blank" rel="noopener noreferrer" onclick="track('leave-review')">${LANG === "fr" ? "Laisser un avis ⭐" : "Leave a review ⭐"}</a></div>`;

        const introHtml = `<div class="ss-intro">${LANG === "fr" ? SITE.intro_fr : SITE.intro_en}</div>`;
        const artUrl = (slug) => "/blog/" + slug + ".html" + (LANG === "en" ? "?lang=en" : "");
        const articles = SITE.articles.map((a) => `
            <a class="ss-article" href="${artUrl(a.slug)}" onclick="track('article-${esc(a.slug)}')">
              <div class="ss-article-media"><img src="/assets/${esc(a.img)}" alt="${esc(tx(a, "title"))}" loading="lazy" onerror="this.parentElement.textContent='📖'"/></div>
              <div class="ss-article-body">
                <div class="ss-article-title">${esc(tx(a, "title"))}</div>
                <div class="ss-article-exc">${esc(tx(a, "exc"))}</div>
                <div class="ss-article-read">📖 ${esc(tx(a, "read"))}</div>
              </div>
            </a>`).join("");
        const blogAll = `<div style="text-align:center;margin-top:12px"><a class="ss-seeall" href="${LANG === "en" ? "/en/blog/" : "/fr/blog/"}" onclick="track('see-all-articles')">${esc(tx(SITE, "articles_allcta"))}</a></div>`;

        const nav = [
          ["/shop.html", LANG === "fr" ? "Boutique" : "Shop"],
          ["/fr/a-propos/", LANG === "fr" ? "À propos" : "About"],
          ["/fr/blog/", "Blog"],
          ["/fr/contact/", "Contact"],
          ["/fr/confidentialite/", LANG === "fr" ? "Confidentialité" : "Privacy"],
          ["/fr/conditions/", LANG === "fr" ? "Conditions" : "Terms"],
        ].map((n) => `<a href="${n[0]}">${esc(n[1])}</a>`).join("");

        // Commerce (Membership, Boutique, Tools, Amazon picks) now lives on /shop.html —
        // the homepage stays content-first and links to the shop via this CTA.
        const shopCta = `
          <a class="ss-shopcta" href="/shop.html${LANG === "en" ? "?lang=en" : ""}" onclick="track('go-shop')">
            <span class="ss-shopcta-emoji">🛍️</span>
            <span class="ss-shopcta-txt"><b>${LANG === "fr" ? "La Boutique" : "The Shop"}</b>${LANG === "fr" ? "Tous mes guides, l'abonnement & mes outils" : "All my guides, the membership & tools"}</span>
            <span class="ss-shopcta-arrow">→</span>
          </a>`;

        document.getElementById("ssApp").innerHTML =
          profile + `<div class="ss-divider"></div>` +
          introHtml +
          `<div class="ss-label" id="sec-blog">${esc(tx(SITE, "articles_label"))}</div><div class="ss-articles">${articles}</div>` + blogAll +
          `<div class="ss-divider"></div>` +
          `<div class="ss-label" id="sec-free">${LANG === "fr" ? "Commence ici · Gratuit" : "Start here · Free"}</div>` + free +
          shopCta +
          `<div class="ss-label" id="sec-avis">${esc(tx(SITE, "testi_label"))}</div><div class="ss-testi-scroll">${testis}</div>` + reviewCta +
          `<footer class="ss-footer">
             <div class="ss-footer-div"></div>
             <strong>Schicgirl</strong><br/>${esc(tx(SITE, "disc"))}
             <div class="ss-footer-nav">${nav}</div>
             <div class="ss-footer-copy">© 2024–2026 Schicgirl · schicgirl.me</div>
           </footer>`;
        const _app = document.getElementById("ssApp");
        if (sgFirstRender) { sgFirstRender = false; _app.classList.add("sg-reveal"); setTimeout(() => _app.classList.remove("sg-reveal"), 1400); }
        else { _app.classList.remove("sg-reveal"); }
      }

      function ssSetLang(lang) {
        LANG = lang;
        document.getElementById("ssEn").classList.toggle("on", lang === "en");
        document.getElementById("ssFr").classList.toggle("on", lang === "fr");
        document.getElementById("ssEn").setAttribute("aria-pressed", lang === "en");
        document.getElementById("ssFr").setAttribute("aria-pressed", lang === "fr");
        document.documentElement.lang = lang;
        try { localStorage.setItem("sg_lang", lang); } catch (e) {}
        render();
      }
      window.ssSetLang = ssSetLang;

      document.getElementById("ssEn").classList.toggle("on", LANG === "en");
      document.getElementById("ssFr").classList.toggle("on", LANG === "fr");
      document.getElementById("ssEn").setAttribute("aria-pressed", LANG === "en");
      document.getElementById("ssFr").setAttribute("aria-pressed", LANG === "fr");
      document.documentElement.lang = LANG;
      render();
      fetchReviews();
      try {
        const d = JSON.parse(localStorage.getItem("schicgirl_analytics") || '{"visits":[],"clicks":[]}');
        d.visits.unshift({ ts: Date.now(), lang: LANG, ref: document.referrer, mob: /Mobi|Android/i.test(navigator.userAgent) });
        if (d.visits.length > 600) d.visits.length = 600;
        localStorage.setItem("schicgirl_analytics", JSON.stringify(d));
      } catch (e) {}
    </script>
  </body>
</html>
