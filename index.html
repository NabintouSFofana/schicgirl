    <style>
      :root {
        --bg: #fbf6ef; --card: #ffffff; --ink: #2a1a0f; --ink-soft: #6b4a30;
        --muted: rgba(42, 26, 15, 0.66); --faint: rgba(42, 26, 15, 0.5);
        --gold: #c9934a; --gold-deep: #a86d23; --gold-lt: #e8c07e; --gold-pale: #f6ead4;
        --rose: #e8b4a0; --line: #d6cdbf; --line-gold: rgba(201, 147, 74, 0.45);
        --serif: "Cormorant Garamond", Georgia, serif; --sans: "Jost", system-ui, -apple-system, sans-serif;
        --r: 18px;
        --shadow-s: 0 1px 3px rgba(60, 38, 24, 0.09), 0 6px 16px -6px rgba(60, 38, 24, 0.2);
        --shadow: 0 2px 6px rgba(60, 38, 24, 0.1), 0 18px 36px -16px rgba(60, 38, 24, 0.26);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--sans); color: var(--ink);
        background: radial-gradient(ellipse 100% 40% at 50% -10%, rgba(232, 180, 160, 0.25), transparent 60%), linear-gradient(180deg, #fdf9f3, #f7efe4);
        background-attachment: fixed; min-height: 100vh; padding: 0 0 40px;
        -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
      }
      img { display: block; max-width: 100%; -webkit-user-drag: none; }
      a { text-decoration: none; color: inherit; }
      a:focus-visible, button:focus-visible { outline: 2px solid var(--gold-deep); outline-offset: 2px; border-radius: 6px; }
      #schicgirlWrap { display: none; }

      /* Entrance reveal (premium load animation) */
      @keyframes sgFadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
      @media (prefers-reduced-motion: no-preference) {
        .sg-reveal > * { animation: sgFadeUp 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) both; }
        .sg-reveal > *:nth-child(1) { animation-delay: 0s; }
        .sg-reveal > *:nth-child(2) { animation-delay: .05s; }
        .sg-reveal > *:nth-child(3) { animation-delay: .10s; }
        .sg-reveal > *:nth-child(4) { animation-delay: .15s; }
        .sg-reveal > *:nth-child(5) { animation-delay: .20s; }
        .sg-reveal > *:nth-child(6) { animation-delay: .25s; }
        .sg-reveal > *:nth-child(7) { animation-delay: .30s; }
        .sg-reveal > *:nth-child(8) { animation-delay: .34s; }
        .sg-reveal > *:nth-child(n+9) { animation-delay: .38s; }
      }

      .ss-top {
        position: relative; z-index: 50; display: flex; justify-content: flex-end; padding: 10px 18px;
        background: rgba(251, 246, 239, 0.72); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line);
      }
      .ss-lang { display: flex; background: rgba(201, 147, 74, 0.1); border-radius: 100px; padding: 3px; gap: 2px; }
      .ss-lang button {
        border: none; background: transparent; cursor: pointer; font-family: var(--sans); font-size: 12px;
        font-weight: 600; letter-spacing: 0.04em; color: var(--muted); padding: 9px 16px; border-radius: 100px; transition: all 0.2s;
      }
      .ss-lang button.on { background: var(--gold); color: #fff; box-shadow: 0 2px 8px rgba(201, 147, 74, 0.35); }

      .ss-wrap { max-width: 560px; margin: 0 auto; padding: 0 20px; }

      /* Quick jump-nav (sticky chips) */
      .ss-nav {
        position: sticky; top: 0; z-index: 40; display: flex; gap: 6px; overflow-x: auto;
        padding: 9px 20px; margin: 4px -20px 2px; background: rgba(251, 246, 239, 0.85);
        backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); scrollbar-width: none;
      }
      .ss-nav::-webkit-scrollbar { display: none; }
      .ss-nav a {
        flex: 1 1 0; min-width: 0; text-align: center; font-size: 11.5px; font-weight: 600; color: var(--gold-deep);
        background: rgba(201, 147, 74, 0.1); border: 1px solid var(--line-gold);
        padding: 10px 6px; border-radius: 100px; white-space: nowrap; transition: background 0.2s, color 0.2s;
      }
      .ss-nav a:hover { background: var(--gold); color: #fff; }
      .ss-label { scroll-margin-top: 64px; }

      .ss-profile { text-align: center; padding: 40px 0 20px; }
      .ss-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--line-gold), transparent); margin: 0 0 8px; }
      /* Tap feedback (mobile affordance — confirms the block is clickable) */
      .ss-product:active, .ss-pick3:active, .ss-link:active, .ss-free:active, .ss-social:active, .ss-seeall:active { transform: scale(0.98); }
      .ss-avatar {
        width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 16px; padding: 4px;
        background: linear-gradient(135deg, var(--gold-lt), var(--rose)); box-shadow: var(--shadow-s);
      }
      .ss-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #fff; }
      .ss-name { font-family: var(--serif); font-size: 40px; font-weight: 500; line-height: 1; letter-spacing: 0.005em; color: var(--ink); }
      .ss-name span { color: var(--gold-deep); font-style: italic; font-weight: 600; }
      .ss-proof {
        display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11px; font-weight: 600;
        letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-deep);
      }
      .ss-proof::before { content: "✦"; color: var(--gold); }
      .ss-bio { font-family: var(--serif); font-size: 18px; font-style: italic; color: var(--ink-soft); line-height: 1.6; letter-spacing: 0.01em; max-width: 320px; margin: 11px auto 0; }
      .ss-trust { display: inline-flex; align-items: center; gap: 9px; margin-top: 16px; font-size: 12.5px; font-weight: 600; color: var(--ink); }
      .ss-trust .stars { color: var(--gold); letter-spacing: 1px; }
      .ss-trust .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--line-gold); }
      .ss-trust .muted { color: var(--muted); font-weight: 500; }
      .ss-socials { display: flex; justify-content: center; gap: 10px; margin-top: 18px; }
      .ss-social {
        width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        background: var(--card); border: 1.5px solid var(--line); box-shadow: var(--shadow-s); color: var(--gold-deep);
        font-size: 18px; transition: transform 0.2s, box-shadow 0.2s;
      }
      .ss-social:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
      .ss-social svg { display: block; }

      .ss-label {
        display: flex; align-items: center; gap: 10px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.2em;
        text-transform: uppercase; color: var(--gold-deep); margin: 32px 2px 14px;
      }
      .ss-label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--line-gold), transparent); }

      .ss-free {
        display: block; background: linear-gradient(135deg, rgba(232, 180, 160, 0.18), #fffdf9);
        border: 1.5px solid var(--line-gold); border-radius: var(--r); padding: 20px; box-shadow: var(--shadow-s);
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .ss-free:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-style: solid; }
      .ss-free-top { display: flex; align-items: center; gap: 14px; }
      .ss-free-icon {
        width: 50px; height: 50px; border-radius: 15px; flex-shrink: 0; font-size: 24px;
        display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--rose), var(--gold-lt));
      }
      .ss-free-tag { font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rose); }
      .ss-free-title { font-size: 16px; font-weight: 700; line-height: 1.25; margin-top: 2px; }
      .ss-free-sub { font-size: 13px; color: var(--muted); line-height: 1.45; margin-top: 5px; }
      .ss-free-btn {
        display: block; text-align: center; margin-top: 16px; background: var(--gold); color: #fff; font-size: 13px;
        font-weight: 700; letter-spacing: 0.03em; padding: 13px; border-radius: 12px; box-shadow: 0 6px 16px rgba(201, 147, 74, 0.32); transition: filter 0.2s;
      }
      .ss-free:hover .ss-free-btn { filter: brightness(1.06); }

      .ss-products { display: flex; flex-direction: column; gap: 9px; }
      .ss-product {
        display: flex; gap: 13px; align-items: center; background: var(--card); border: 1.5px solid var(--line);
        border-radius: 15px; padding: 10px 13px; box-shadow: var(--shadow-s); transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      }
      .ss-product:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--line-gold); }
      .ss-product-media {
        position: relative; width: 54px; flex-shrink: 0; aspect-ratio: 3 / 4; border-radius: 10px; overflow: hidden;
        background: linear-gradient(135deg, var(--gold-pale), rgba(201, 147, 74, 0.25)); display: flex; align-items: center; justify-content: center;
        font-size: 28px; color: var(--gold);
      }
      .ss-product-media img { width: 100%; height: 100%; object-fit: cover; }
      .ss-product-badge {
        position: absolute; top: 6px; left: 6px; font-size: 8px; font-weight: 700; letter-spacing: 0.06em;
        text-transform: uppercase; color: #3a2412; background: var(--gold-lt); padding: 3px 7px; border-radius: 100px;
      }
      .ss-product-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      .ss-product-title { font-size: 16px; font-weight: 700; line-height: 1.2; }
      .ss-product-desc {
        font-size: 12.5px; color: var(--muted); line-height: 1.4; margin-top: 4px;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      }
      .ss-product-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 5px; }
      .ss-product-price { display: flex; align-items: baseline; gap: 6px; }
      .ss-product-price .amt { font-family: var(--serif); font-size: 22px; font-weight: 600; color: var(--gold-deep); line-height: 1; }
      .ss-product-price .cfa { font-size: 10px; font-weight: 500; color: var(--faint); }
      /* Featured flagship card (Le Studio · Planner) — distinct colour, thicker border, visible shadow */
      .ss-product.feat {
        background: linear-gradient(135deg, var(--gold-pale), #fffdf8);
        border: 2px solid var(--gold);
        box-shadow: 0 8px 26px rgba(201, 147, 74, 0.38), 0 2px 6px rgba(60, 38, 24, 0.12);
      }
      .ss-product.feat .ss-product-title { color: var(--ink); }
      .ss-product.feat .ss-product-price .amt { color: var(--gold-deep); }

      /* Amazon picks — 3 aligned horizontal blocks */
      .ss-picks3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .ss-pick3 {
        display: flex; flex-direction: column; align-items: center; text-align: center;
        background: var(--card); border: 1.5px solid var(--line); border-radius: 14px;
        padding: 10px 8px; box-shadow: var(--shadow-s); transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      }
      .ss-pick3:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--line-gold); }
      .ss-pick3-media {
        width: 100%; aspect-ratio: 1 / 1; border-radius: 10px; overflow: hidden; margin-bottom: 8px;
        background: var(--gold-pale); display: flex; align-items: center; justify-content: center; font-size: 26px; color: var(--gold-deep);
      }
      .ss-pick3-media img { width: 100%; height: 100%; object-fit: cover; }
      .ss-pick3-media img[src*="icon_amazon"], .ss-pick3-media img[src*="icon_shop"] { object-fit: contain; padding: 15px; }
      .ss-pick3-name {
        font-size: 11.5px; font-weight: 600; line-height: 1.3; color: var(--ink);
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      }

      .ss-seeall {
        display: block; text-align: center; margin-top: 14px; padding: 13px; border-radius: 100px;
        font-size: 13px; font-weight: 700; letter-spacing: 0.03em; color: var(--gold-deep);
        background: transparent; border: 1.5px solid var(--gold); transition: all 0.2s;
      }
      .ss-seeall:hover { background: var(--gold); color: #fff; box-shadow: 0 6px 16px rgba(201, 147, 74, 0.3); }

      .ss-links { display: flex; flex-direction: column; gap: 11px; }
      .ss-link {
        display: flex; align-items: center; gap: 14px; background: var(--card); border: 1.5px solid var(--line);
        border-radius: 15px; padding: 14px 16px; box-shadow: var(--shadow-s); transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      }
      .ss-link:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--line-gold); }
      .ss-link-icon {
        width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0; font-size: 20px; display: flex; align-items: center;
        justify-content: center; overflow: hidden; background: rgba(201, 147, 74, 0.1); border: 1px solid var(--line-gold); color: var(--gold-deep);
      }
      .ss-link-icon img { width: 100%; height: 100%; object-fit: cover; }
      .ss-link-body { flex: 1; min-width: 0; }
      .ss-link-title { font-size: 14.5px; font-weight: 600; line-height: 1.25; }
      .ss-link-sub { font-size: 12px; color: var(--muted); line-height: 1.35; margin-top: 2px; }

      .ss-testi-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
      .ss-testi-scroll::-webkit-scrollbar { display: none; }
      .ss-testi {
        flex-shrink: 0; width: 240px; background: var(--card); border: 1.5px solid var(--line);
        border-radius: 15px; padding: 17px; box-shadow: var(--shadow-s);
      }
      .ss-testi-photo { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold-lt); margin-bottom: 12px; display: block; }
      .ss-testi-stars { color: var(--gold); font-size: 12px; letter-spacing: 2px; margin-bottom: 8px; }
      .ss-testi-text { font-family: var(--serif); font-style: italic; font-size: 15px; line-height: 1.55; color: var(--ink); }
      .ss-testi-author { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin-top: 10px; }

      .ss-footer { text-align: center; margin-top: 40px; font-size: 11px; color: var(--muted); line-height: 1.7; }
      .ss-footer-div { height: 1px; background: linear-gradient(90deg, transparent, var(--line-gold), transparent); margin: 14px 0; }
      .ss-footer strong { color: var(--gold-deep); }
      .ss-footer-nav { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
      .ss-footer-nav a { font-weight: 600; color: var(--ink-soft); padding: 0 9px; }
      .ss-footer-nav a:not(:last-child) { border-right: 1px solid var(--line); }
      .ss-footer-copy { margin-top: 12px; font-size: 10px; letter-spacing: 0.04em; opacity: 0.85; }

      /* Cookie consent banner (RGPD) */
      .sg-consent {
        position: fixed; left: 12px; right: 12px; bottom: 12px; z-index: 200; max-width: 720px; margin: 0 auto;
        background: #fffaf2; border: 1.5px solid var(--line-gold); border-radius: 16px;
        box-shadow: 0 10px 34px -10px rgba(60, 38, 24, 0.45); padding: 15px 18px;
        display: flex; gap: 12px 16px; align-items: center; justify-content: space-between; flex-wrap: wrap;
      }
      .sg-consent[hidden] { display: none; }
      .sg-consent p { margin: 0; font-size: 12.5px; line-height: 1.5; color: var(--ink); flex: 1 1 280px; }
      .sg-consent a { color: var(--gold-deep); text-decoration: underline; }
      .sg-consent-btns { display: flex; gap: 8px; flex-shrink: 0; }
      .sg-consent button {
        font-family: var(--sans); font-size: 12.5px; font-weight: 600; cursor: pointer;
        padding: 9px 18px; border-radius: 100px; transition: filter 0.2s, background 0.2s, color 0.2s;

      .sg-consent .sg-refuse { background: transparent; border: 1.5px solid var(--line); color: var(--ink-soft); }

        render();

      window.ssSetLang = ssSetLang;

      document.getElementById("ssEn").classList.toggle("on", LANG === "en");
      document.getElementById("ssFr").classList.toggle("on", LANG === "fr");
      document.getElementById("ssEn").setAttribute("aria-pressed", LANG === "en");
      document.getElementById("ssFr").setAttribute("aria-pressed", LANG === "fr");
      document.documentElement.lang = LANG;
      render();
      fetchReviews();
      try {
        const d = JSON.parse(localStorage.getItem("schicgirl_analytics") || '{"visits":[],"clicks":[]}');
        d.visits.unshift({ ts: Date.now(), lang: LANG, ref: document.referrer, mob: /Mobi|Android/i.test(navigator.userAgent) });
        if (d.visits.length > 600) d.visits.length = 600;
        localStorage.setItem("schicgirl_analytics", JSON.stringify(d));
      } catch (e) {}
    </script>
  </body>
</html>
