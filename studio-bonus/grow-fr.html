<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POUSSE — Le Cours de Croissance des Cheveux de Type 4 · Schicgirl Naturals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Mulish:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F8F4EE; --card:#FCFAF4; --green:#7DAA87; --green-deep:#3F5A49;
  --sage-bg:#DCE7DD; --sage-tint:#EAF1EB; --sage-mid:#B7D0BD; --sage-deep:#466A51;
  --gold:#C9A86A; --gold-deep:#8A6B2C; --gold-soft:#E0CC97;
  --ink:#352E26; --ink-soft:#565C52; --line:#E7DDC9;
  --cream-bg:#F4ECDD; --cream-tint:#F9F3E9;
  --beige-bg:#EFEAE0; --beige-tint:#F6F2EA; --beige-deep:#6B6549;
  --rose-bg:#F4E7E3; --rose-tint:#FBF2EF; --rose-mid:#E8CFC9; --rose-deep:#8F584F;
  --serif-d:'Cormorant Garamond',Georgia,serif;
  --serif:'Mulish',-apple-system,'Segoe UI',sans-serif;
  --sans:'Jost',Arial,sans-serif;
  --sb:300px;
  --shadow:0 14px 40px -22px rgba(60,52,43,.45);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--serif);color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased;}
a{color:var(--green-deep);}
img{max-width:100%;}

/* ============ SIDEBAR ============ */
.sidebar{position:fixed;top:0;left:0;width:var(--sb);height:100vh;background:#FBF7F0;
  border-right:1px solid var(--line);display:flex;flex-direction:column;z-index:40;}
.sb-head{padding:22px 22px 16px;border-bottom:1px solid var(--line);}
.sb-logo{width:128px;display:block;margin:0 auto 12px;}
.sb-prog{display:flex;align-items:center;gap:12px;}
.ring{flex:0 0 auto;}
.ring-pct{font-family:var(--sans);font-weight:600;font-size:10pt;fill:var(--green-deep);}
.sb-prog .lbl{font-family:var(--sans);font-size:7.6pt;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep);}
.sb-prog .sub{font-family:var(--serif);font-style:italic;font-size:10.5pt;color:var(--ink-soft);}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0 28px;}
.sb-nav::-webkit-scrollbar{width:8px;}
.sb-nav::-webkit-scrollbar-thumb{background:#E3D9C5;border-radius:8px;}
.modgrp{margin-top:8px;}
.modtitle{font-family:var(--sans);font-weight:600;font-size:7.4pt;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold-deep);padding:12px 22px 5px;display:flex;align-items:center;gap:7px;}
.modtitle .mt-i{color:var(--sage-deep);display:flex;}
.lk{display:flex;align-items:center;gap:10px;padding:7px 22px 7px 24px;cursor:pointer;
  font-family:var(--serif);font-size:10.6pt;color:var(--ink);border-left:3px solid transparent;transition:.15s;}
.lk:hover{background:var(--sage-tint);}
.lk.active{background:var(--sage-tint);border-left-color:var(--gold);color:var(--green-deep);font-weight:500;}
.lk .dot{flex:0 0 auto;width:16px;height:16px;border-radius:50%;border:1.6px solid var(--sage-mid);
  display:flex;align-items:center;justify-content:center;}
.lk.done .dot{background:var(--green);border-color:var(--green);}
.lk.done .dot svg.ck{display:block;}
.lk .dot svg{display:none;width:9px;height:9px;}
.lk.locked{cursor:not-allowed;color:#A79E8C;}
.lk.locked:hover{background:transparent;}
.lk.locked .dot{border-style:dashed;border-color:#CFC6B2;background:transparent;}
.lk.locked .dot svg.lk-lock{display:block;width:8px;height:8px;}
.lk.locked .tt{font-style:italic;}
.lk .tt{flex:1;line-height:1.28;}
.sb-foot{padding:12px 22px;border-top:1px solid var(--line);font-family:var(--sans);font-size:7.6pt;
  letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);text-align:center;}
.sb-foot a{color:var(--gold-deep);text-decoration:none;}

/* ============ MAIN ============ */
.main{margin-left:var(--sb);min-height:100vh;}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
  background:rgba(248,244,238,.86);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 32px;}
.tb-crumb{font-family:var(--sans);font-size:8pt;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep);}
.tb-crumb b{color:var(--green-deep);font-weight:600;}
.tb-right{display:flex;align-items:center;gap:14px;}
.btn{font-family:var(--sans);font-weight:500;font-size:9pt;letter-spacing:.04em;border:1px solid var(--line);
  background:#fff;color:var(--green-deep);padding:8px 16px;border-radius:30px;cursor:pointer;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:7px;}
.btn:hover{border-color:var(--gold);color:var(--gold-deep);}
.btn.solid{background:var(--green-deep);color:#fff;border-color:var(--green-deep);}
.btn.solid:hover{background:#34503f;color:#fff;}
.btn.gold{background:var(--gold);color:#fff;border-color:var(--gold);}
.btn.gold:hover{background:var(--gold-deep);color:#fff;}
.hamb{display:none;background:none;border:none;cursor:pointer;color:var(--green-deep);}

.wrap{max-width:672px;margin:0 auto;padding:46px 30px 90px;}

/* lesson header */
.kicker{font-family:var(--sans);font-weight:600;font-size:8pt;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-deep);}
h1.ch{font-family:var(--serif-d);font-weight:600;font-size:42pt;line-height:1.02;color:var(--green-deep);margin:6px 0 0;}
.ch-rule{border:none;height:1px;background:linear-gradient(90deg,var(--gold),transparent);width:120px;margin:16px 0 22px;}
.wrap p{font-size:13.4pt;line-height:1.75;margin:0 0 18px;}
.wrap .lead{font-family:var(--serif-d);font-style:italic;font-size:18.5pt;line-height:1.45;color:var(--ink-soft);margin:0 0 24px;}
.wrap .dear{font-family:var(--serif-d);font-style:italic;font-size:15pt;line-height:1.4;color:var(--ink-soft);margin:4px 0 12px;}
.wrap p em{font-style:italic;}
.wrap p strong,.wrap p b{font-weight:600;color:var(--green-deep);}
h2.sub{font-family:var(--serif-d);font-weight:600;font-size:21pt;color:var(--green-deep);margin:30px 0 12px;
  display:flex;align-items:center;gap:9px;}
h2.sub svg{flex:0 0 auto;}

/* component callouts */
.cal{border-radius:11px;padding:16px 20px;margin:20px 0;break-inside:avoid;}
.cal .cal-h{display:flex;align-items:center;gap:8px;font-family:var(--sans);font-weight:600;font-size:8pt;
  letter-spacing:.16em;text-transform:uppercase;margin-bottom:7px;}
.cal p{font-size:11.8pt;line-height:1.6;margin:0;}
.cal-expert{background:var(--cream-tint);border:1px solid var(--gold-soft);}
.cal-expert .cal-h{color:var(--gold-deep);}
.cal-takeaway{background:#EAF0F4;border:1px solid #C4D4DE;}
.cal-takeaway .cal-h{color:#4E7088;}
.cal-takeaway .cal-h .ic,.cal-expert .cal-h .ic{color:currentColor;}
.cal-reminder{background:var(--sage-tint);border:1px solid var(--sage-mid);}
.cal-reminder .cal-h{color:var(--sage-deep);}
.cal-caution{background:var(--rose-tint);border:1px solid var(--rose-mid);}
.cal-caution .cal-h{color:var(--rose-deep);}
.cal-exercise{background:#F1EEDF;border:1px solid #DED6BC;}
.cal-exercise .cal-h{color:var(--beige-deep);}
.affirm{background:var(--rose-tint);border:1px solid var(--rose-mid);border-radius:11px;padding:16px 22px;margin:20px 0;text-align:center;}
.affirm .al{font-family:var(--sans);font-weight:600;font-size:7.4pt;letter-spacing:.18em;text-transform:uppercase;color:var(--rose-deep);margin-bottom:6px;}
.affirm p{font-family:var(--serif-d);font-style:italic;font-weight:500;font-size:15pt;line-height:1.42;color:var(--green-deep);margin:0;}

/* cards & grids */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
.card{border-radius:11px;padding:15px 18px;}
.card .ct{font-family:var(--serif-d);font-weight:600;font-size:14.5pt;color:var(--green-deep);margin-bottom:4px;}
.card p{font-size:11.4pt;line-height:1.55;margin:0;}
.card.sage{background:var(--sage-tint);border:1px solid var(--sage-mid);}
.card.cream{background:var(--cream-tint);border:1px solid var(--gold-soft);}
.card.beige{background:var(--beige-tint);border:1px solid #DED6BC;}
.card.rose{background:var(--rose-tint);border:1px solid var(--rose-mid);}

/* numbered steps */
.steps{margin:18px 0;}
.step{display:flex;gap:14px;margin-bottom:13px;align-items:flex-start;}
.step .num{flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:var(--green);color:#fff;
  font-family:var(--sans);font-weight:600;font-size:11pt;display:flex;align-items:center;justify-content:center;}
.step .bd .t{font-family:var(--serif-d);font-weight:600;font-size:14pt;color:var(--green-deep);}
.step .bd p{font-size:11.5pt;line-height:1.55;margin:2px 0 0;}

/* tables */
table.lux{width:100%;border-collapse:collapse;margin:18px 0;font-size:10.6pt;}
table.lux th{font-family:var(--sans);font-weight:600;font-size:8pt;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gold-deep);text-align:left;padding:9px 12px;border-bottom:2px solid var(--gold-soft);}
table.lux td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top;}
table.lux .nm{font-family:var(--serif-d);font-weight:600;font-size:12.5pt;color:var(--green-deep);}

/* knowledge check */
.quiz{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin:30px 0 10px;box-shadow:var(--shadow);}
.quiz .qh{font-family:var(--sans);font-weight:600;font-size:8pt;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.quiz .qq{font-family:var(--serif-d);font-weight:600;font-size:16pt;color:var(--green-deep);margin-bottom:14px;line-height:1.25;}
.opt{display:flex;align-items:flex-start;gap:11px;border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin-bottom:9px;cursor:pointer;font-size:11pt;transition:.15s;background:#fff;}
.opt:hover{border-color:var(--sage-mid);background:var(--sage-tint);}
.opt .mk{flex:0 0 auto;width:20px;height:20px;border-radius:50%;border:1.6px solid var(--sage-mid);font-family:var(--sans);font-weight:600;font-size:9pt;display:flex;align-items:center;justify-content:center;color:var(--sage-deep);}
.opt.correct{border-color:var(--green);background:var(--sage-tint);}
.opt.correct .mk{background:var(--green);border-color:var(--green);color:#fff;}
.opt.wrong{border-color:var(--rose-deep);background:var(--rose-tint);}
.opt.wrong .mk{background:var(--rose-deep);border-color:var(--rose-deep);color:#fff;}
.qfb{margin-top:6px;font-size:10.6pt;font-style:italic;color:var(--ink-soft);display:none;padding:10px 14px;background:var(--cream-tint);border-radius:9px;border:1px solid var(--gold-soft);}
.qfb.show{display:block;}
.qtry{margin-top:6px;font-size:10.4pt;font-weight:500;color:var(--rose-deep);display:none;padding:10px 14px;background:var(--rose-tint);border-radius:9px;border:1px solid var(--rose-mid);font-family:var(--sans);}
.qtry.show{display:block;}
.quiz.passed .opt{cursor:default;}

/* reflection */
.reflect{background:#F1EEDF;border:1px solid #DED6BC;border-radius:14px;padding:20px 22px;margin:26px 0;}
.reflect .rl{font-family:var(--sans);font-weight:600;font-size:8pt;letter-spacing:.18em;text-transform:uppercase;color:var(--beige-deep);display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.reflect .rp{font-family:var(--serif-d);font-style:italic;font-size:14pt;color:var(--green-deep);margin-bottom:12px;line-height:1.35;}
.reflect textarea{width:100%;min-height:96px;border:1px solid #D8CFB6;border-radius:9px;padding:12px 14px;
  font-family:var(--serif);font-size:11pt;color:var(--ink);background:#FDFBF5;resize:vertical;line-height:1.6;}
.reflect textarea:focus{outline:none;border-color:var(--gold);}
.saved{font-family:var(--sans);font-size:7.6pt;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-deep);margin-top:7px;opacity:0;transition:.3s;}
.saved.show{opacity:1;}

/* lesson footer nav */
.lfoot{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:46px;padding-top:26px;border-top:1px solid var(--line);}
.complete-zone{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;margin:42px 0 0;
  background:var(--sage-tint);border:1px solid var(--sage-mid);border-radius:16px;padding:26px;}
.complete-zone .cz-t{font-family:var(--serif-d);font-style:italic;font-size:14pt;color:var(--green-deep);}
.complete-zone.locked{background:#F4EFE6;border:1px dashed #DCCFB3;}
.complete-zone.locked .cz-t{color:var(--gold-deep);font-style:normal;font-family:var(--sans);font-size:10.5pt;letter-spacing:.02em;}
.btn[disabled]{opacity:.5;cursor:not-allowed;background:#EFE8DA;color:#9C8E70;border-color:#E0D6C0;}
.btn[disabled]:hover{border-color:#E0D6C0;color:#9C8E70;}
.navlinks{display:flex;justify-content:space-between;gap:12px;margin-top:30px;}
.navlinks .btn{flex:0 1 auto;}

/* ===== HOME / WELCOME ===== */
.hero{text-align:center;padding:30px 0 8px;}
.hero .brand{font-family:var(--sans);font-weight:600;font-size:10pt;letter-spacing:.4em;text-transform:uppercase;color:var(--gold-deep);}
.hero h1{font-family:var(--serif-d);font-weight:600;font-size:86pt;line-height:.9;color:var(--green-deep);margin:10px 0 6px;}
.hero .sub{font-family:var(--serif-d);font-style:italic;font-size:19pt;color:var(--ink-soft);max-width:520px;margin:0 auto;}
.flour{display:flex;align-items:center;justify-content:center;gap:14px;margin:20px 0;}
.flour .r{width:70px;height:1px;background:var(--gold);}
.hero .meta{font-family:var(--sans);font-weight:500;font-size:9pt;letter-spacing:.14em;text-transform:uppercase;color:var(--green-deep);margin-top:8px;}
.hero .meta span{color:var(--gold-deep);margin:0 6px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:34px 0;}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 10px;text-align:center;}
.stat .n{font-family:var(--serif-d);font-weight:600;font-size:30pt;color:var(--gold-deep);line-height:1;}
.stat .l{font-family:var(--sans);font-size:7.6pt;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-top:6px;}
.modlist{margin:30px 0;}
.modcard{display:flex;gap:18px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:14px;cursor:pointer;transition:.18s;}
.modcard:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--shadow);}
.modcard .mc-no{flex:0 0 auto;width:54px;height:54px;border-radius:50%;background:var(--sage-tint);border:1px solid var(--sage-mid);
  display:flex;align-items:center;justify-content:center;font-family:var(--serif-d);font-weight:600;font-size:22pt;color:var(--green-deep);}
.modcard .mc-b .mc-e{font-family:var(--sans);font-weight:600;font-size:7.6pt;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);}
.modcard .mc-b .mc-t{font-family:var(--serif-d);font-weight:600;font-size:18pt;color:var(--green-deep);line-height:1.1;margin:1px 0 3px;}
.modcard .mc-b p{font-size:10.4pt;color:var(--ink-soft);margin:0;}
.modcard .mc-meta{font-family:var(--sans);font-size:7.8pt;color:var(--sage-deep);margin-top:6px;letter-spacing:.05em;}
.welcome-box{background:var(--cream-tint);border:1px solid var(--gold-soft);border-radius:16px;padding:26px 28px;margin:30px 0;}
.welcome-box h3{font-family:var(--serif-d);font-weight:600;font-size:20pt;color:var(--green-deep);margin-bottom:6px;}
.welcome-box ol{margin:12px 0 0 20px;}
.welcome-box li{font-size:11pt;margin-bottom:8px;}
.goal-set{margin-top:16px;}
.goal-set label{font-family:var(--sans);font-weight:600;font-size:8pt;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-deep);display:block;margin-bottom:6px;}
.goal-set input{width:100%;border:1px solid var(--gold-soft);border-radius:9px;padding:11px 14px;font-family:var(--serif);font-size:11.5pt;background:#fff;}
.goal-set input:focus{outline:none;border-color:var(--gold);}

/* ===== 90-DAY CHALLENGE ===== */
.band{display:flex;align-items:baseline;justify-content:space-between;border-radius:10px;padding:11px 18px;margin:26px 0 14px;}
.band .bt{font-family:var(--serif-d);font-weight:600;font-size:16pt;}
.band .bs{font-family:var(--sans);font-weight:600;font-size:8pt;letter-spacing:.14em;text-transform:uppercase;}
.band.sage{background:var(--sage-tint);}.band.sage .bt{color:var(--green-deep);}.band.sage .bs{color:var(--sage-deep);}
.band.beige{background:var(--beige-tint);}.band.beige .bt{color:var(--beige-deep);}.band.beige .bs{color:var(--beige-deep);}
.band.rose{background:var(--rose-tint);}.band.rose .bt{color:var(--rose-deep);}.band.rose .bs{color:var(--rose-deep);}
.wk{margin:14px 0 6px;}
.wk .wt{font-family:var(--sans);font-weight:600;font-size:8.4pt;letter-spacing:.14em;text-transform:uppercase;color:var(--sage-deep);}
.wk .ws{font-family:var(--serif-d);font-style:italic;font-size:14pt;color:var(--ink-soft);}
ul.check{list-style:none;margin:6px 0 4px;}
ul.check li{display:flex;align-items:flex-start;gap:11px;padding:7px 0;font-size:11pt;cursor:pointer;}
ul.check li .cb{flex:0 0 auto;width:20px;height:20px;border-radius:5px;border:1.7px solid var(--sage-mid);background:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;}
ul.check li .cb svg{display:none;width:12px;height:12px;}
ul.check li.checked .cb{background:var(--green);border-color:var(--green);}
ul.check li.checked .cb svg{display:block;}
ul.check li.checked .ct{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--sage-mid);}
table.track{width:100%;border-collapse:collapse;margin:14px 0;}
table.track th{font-family:var(--sans);font-weight:600;font-size:8pt;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-deep);padding:9px 8px;border-bottom:2px solid var(--gold-soft);text-align:center;}
table.track th:first-child{text-align:left;}
table.track td{padding:0;border-bottom:1px solid var(--line);}
table.track td.loc{font-family:var(--serif-d);font-weight:600;font-size:12.5pt;color:var(--green-deep);padding:8px 8px;}
table.track td input{width:100%;border:none;background:transparent;text-align:center;font-family:var(--serif);font-size:11pt;padding:11px 4px;color:var(--ink);}
table.track td input:focus{outline:none;background:var(--sage-tint);}
.scale{font-family:var(--sans);font-size:8pt;letter-spacing:.06em;color:var(--ink-soft);text-align:right;margin-top:-6px;}

/* ===== RECIPE LAB ===== */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 24px;}
.filt{font-family:var(--sans);font-weight:500;font-size:8.6pt;letter-spacing:.04em;border:1px solid var(--line);background:#fff;color:var(--ink-soft);padding:7px 15px;border-radius:30px;cursor:pointer;transition:.15s;}
.filt:hover{border-color:var(--sage-mid);}
.filt.on{background:var(--green-deep);color:#fff;border-color:var(--green-deep);}
.recipe{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:20px 22px;margin-bottom:16px;position:relative;overflow:hidden;}
.recipe::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-soft),var(--gold),var(--gold-deep));}
.rtop{margin-bottom:5px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.badge{font-family:var(--sans);font-weight:600;font-size:7pt;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
.b-easy{background:var(--sage-bg);color:var(--green-deep);}
.b-mod{background:#F1E6CC;color:var(--gold-deep);}
.b-adv{background:#F3DED9;color:var(--rose-deep);}
.b-type{background:transparent;border:1px solid var(--sage-mid);color:var(--ink-soft);}
.rname{font-family:var(--serif-d);font-weight:600;font-size:20pt;color:var(--green-deep);line-height:1.05;margin-top:3px;}
.rben{font-family:var(--serif);font-style:italic;font-size:10.4pt;color:var(--ink-soft);margin:2px 0 12px;}
.rb{display:grid;grid-template-columns:42% 1fr;gap:18px;}
.rh{font-family:var(--sans);font-weight:600;font-size:7.4pt;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:8px;}
.ig{width:100%;border-collapse:collapse;}
.ig td{font-family:var(--sans);font-size:9pt;padding:5px 0;border-bottom:1px solid #efe7d6;color:var(--ink);}
.ig td.q{text-align:right;color:var(--green-deep);font-weight:600;white-space:nowrap;}
.ig tr:last-child td{border-bottom:none;}
ol.rsteps{margin:0;padding:0;list-style:none;counter-reset:s;}
ol.rsteps li{position:relative;padding-left:26px;margin-bottom:9px;font-size:10pt;line-height:1.45;counter-increment:s;}
ol.rsteps li::before{content:counter(s);position:absolute;left:0;top:1px;width:18px;height:18px;background:var(--green);color:#fff;border-radius:50%;font-family:var(--sans);font-weight:600;font-size:7.6pt;display:flex;align-items:center;justify-content:center;}
.rmeta{margin-top:12px;padding-top:11px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:18px;}
.chip{font-family:var(--sans);font-size:8.4pt;color:var(--ink-soft);}
.chip b{font-family:var(--sans);font-weight:600;color:var(--green-deep);text-transform:uppercase;letter-spacing:.06em;font-size:7.2pt;margin-right:4px;}

/* ===== CERTIFICATE ===== */
.cert{background:linear-gradient(160deg,#FCFAF4,#F4ECDD);border:2px solid var(--gold-soft);border-radius:18px;
  padding:46px 40px;text-align:center;position:relative;box-shadow:var(--shadow);}
.cert .cframe{position:absolute;inset:12px;border:1px solid var(--gold);border-radius:12px;pointer-events:none;}
.cert .ce{font-family:var(--sans);font-weight:600;font-size:8pt;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-deep);}
.cert h2{font-family:var(--serif-d);font-weight:600;font-size:40pt;color:var(--green-deep);margin:8px 0;line-height:1;}
.cert .nm{font-family:var(--serif-d);font-style:italic;font-size:26pt;color:var(--gold-deep);margin:14px 0;border-bottom:1px solid var(--gold-soft);display:inline-block;padding:0 30px 6px;}
.cert p{font-size:11pt;max-width:440px;margin:8px auto;}
.cert.locked{filter:grayscale(.4);opacity:.6;}
.lockmsg{text-align:center;font-family:var(--serif-d);font-style:italic;font-size:14pt;color:var(--ink-soft);margin:20px 0;}

/* cross-sell */
.xsell{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:24px 0;}
.xs{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px 20px;text-decoration:none;color:inherit;display:block;transition:.18s;}
.xs:hover{border-color:var(--gold);transform:translateY(-2px);}
.xs .xe{font-family:var(--sans);font-weight:600;font-size:7.4pt;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep);}
.xs .xt{font-family:var(--serif-d);font-weight:600;font-size:17pt;color:var(--green-deep);margin:2px 0 4px;}
.xs p{font-size:10pt;color:var(--ink-soft);margin:0;}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green-deep);color:#fff;
  font-family:var(--sans);font-size:9.5pt;padding:12px 24px;border-radius:30px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;z-index:90;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.scrim{display:none;position:fixed;inset:0;background:rgba(60,52,43,.4);z-index:35;}

@media(max-width:920px){
  :root{--sb:0px;}
  .sidebar{transform:translateX(-100%);transition:.25s;width:300px;box-shadow:var(--shadow);}
  body.menu-open .sidebar{transform:translateX(0);}
  body.menu-open .scrim{display:block;}
  .hamb{display:inline-flex;}
  .main{margin-left:0;}
  .hero h1{font-size:62pt;}
  .grid2,.stats,.xsell{grid-template-columns:1fr 1fr;}
  .rb{grid-template-columns:1fr;}
  .topbar{padding:11px 18px;}
  .wrap{padding:32px 20px 80px;}
}
@media(max-width:560px){
  .stats{grid-template-columns:1fr 1fr;}
  .grid2{grid-template-columns:1fr;}
  .hero h1{font-size:50pt;}
  .modcard .mc-no{width:44px;height:44px;font-size:18pt;}
}
@media print{
  .sidebar,.topbar,.lfoot,.navlinks,.complete-zone,.quiz,.scrim,.toast,.filters,.vlesson{display:none!important;}
  .main{margin:0;}
  .wrap{max-width:100%;padding:0;}
}

/* ===== INSTRUCTOR VIDEO PLAYER ===== */
.vlesson{position:relative;margin:0 0 28px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#3F5A49;box-shadow:var(--shadow);}
.vlesson .vplayer{display:block;width:100%;aspect-ratio:16/9;background:#3F5A49;}
.vplaceholder{position:absolute;top:0;left:0;right:0;aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;
  background:linear-gradient(140deg,#3F5A49,#577E61);color:#F8F4EE;text-align:center;padding:24px;}
.vlesson.hasvid .vplaceholder{display:none;}
.vp-ring{width:64px;height:64px;border-radius:50%;border:2px solid rgba(248,244,238,.75);display:flex;align-items:center;justify-content:center;
  font-size:21pt;color:#F8F4EE;padding-left:5px;}
.vp-t{font-family:var(--serif-d);font-style:italic;font-size:18pt;line-height:1.1;}
.vp-s{font-family:var(--sans);font-size:7.8pt;letter-spacing:.1em;text-transform:uppercase;color:#DCE7DD;}
.vp-s code{background:rgba(0,0,0,.28);padding:2px 7px;border-radius:5px;letter-spacing:0;text-transform:none;font-family:monospace;}
.vcap{display:flex;align-items:center;gap:8px;font-family:var(--sans);font-weight:600;font-size:8pt;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold-deep);background:var(--cream-tint);border-top:1px solid var(--gold-soft);padding:10px 16px;}
/* ===== BRANDED LESSON BANNER (no video) ===== */
.vbrand{position:relative;margin:0 0 28px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:var(--green-deep);box-shadow:var(--shadow);}
.vbrand-in{position:relative;overflow:hidden;background:linear-gradient(140deg,#3F5A49,#577E61);color:#F8F4EE;text-align:center;padding:34px 22px;}
.vb-flourish{display:inline-block;transform:scale(1.7);opacity:.92;}
.vb-tag{margin-top:14px;font-family:var(--serif-d);font-style:italic;font-size:18pt;line-height:1.2;color:#F8F4EE;}
.vb-shine{position:absolute;top:0;left:-60%;width:45%;height:100%;pointer-events:none;background:linear-gradient(100deg,transparent,rgba(224,204,151,.30),transparent);transform:skewX(-18deg);animation:vbShine 1.7s ease-out .35s both;}
@keyframes vbShine{from{left:-60%}to{left:130%}}
@media (prefers-reduced-motion:reduce){.vb-shine{animation:none;}}


/* ===== MEET THE INSTRUCTOR ===== */
.instructor{display:flex;gap:20px;align-items:center;background:var(--card);border:1px solid var(--gold-soft);border-radius:16px;padding:22px 24px;margin:30px 0;}
.instructor .iav{flex:0 0 auto;width:98px;height:98px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);background:var(--sage-tint);}
.instructor .iav-fallback{align-items:center;justify-content:center;font-family:var(--serif-d);font-weight:600;font-size:30pt;font-style:italic;color:var(--green-deep);}
.instructor .ie{font-family:var(--sans);font-weight:600;font-size:7.6pt;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-deep);}
.instructor .inm{font-family:var(--serif-d);font-weight:600;font-size:23pt;color:var(--green-deep);line-height:1;margin:2px 0 7px;}
.instructor .ib p{font-size:10.8pt;color:var(--ink-soft);margin:0;font-style:italic;font-family:var(--serif-d);}
@media(max-width:560px){.instructor{flex-direction:column;text-align:center;}}
</style>

/* ---------- MODULE I ---------- */
L.l1 = ()=>`
${head('Module I · Comprendre la croissance','Comment poussent vraiment<br>les cheveux de Type 4')}
<p class="lead">Pendant des années, j&rsquo;ai cru que mes cheveux ne poussaient tout simplement pas. La vérité, c&rsquo;est qu&rsquo;ils poussaient &mdash; je ne savais simplement pas comment les garder.</p>
<p>Commençons par la vérité que personne ne vous a clairement dite&nbsp;: vos cheveux poussent. Ils ont toujours poussé. Le problème n&rsquo;a jamais été la pousse &mdash; c&rsquo;est la <em>rétention</em>. Comprendre cette seule distinction changera à jamais votre relation avec vos cheveux.</p>
${h2('Le cycle de croissance du cheveu')}
<p>Chaque follicule de votre cuir chevelu traverse trois phases distinctes. La phase <strong>anagène</strong> est celle de la croissance active, qui dure de deux à sept ans. En moyenne, les cheveux poussent d&rsquo;environ un centimètre et demi par mois &mdash; soit à peu près douze à dix-huit centimètres par an &mdash; et cela reste constant pour toutes les textures, du Type 1 lisse au Type 4C très crépu.</p>
<p>La phase <strong>catagène</strong> est une courte transition de deux à trois semaines pendant laquelle la croissance s&rsquo;interrompt. La phase <strong>télogène</strong> est celle du repos &mdash; le cheveu reste en place pendant environ trois mois avant de tomber naturellement. Perdre 50 à 100 cheveux par jour est tout à fait normal.</p>
${h2('Pourquoi les cheveux de Type 4 semblent ne pas pousser')}
<p>Les cheveux de Type 4 ont une structure très bouclée. Le sébum &mdash; l&rsquo;huile naturelle que votre cuir chevelu produit pour hydrater vos longueurs &mdash; peine à descendre le long de la fibre. Sur un cheveu lisse, il glisse de la racine à la pointe&nbsp;; sur un cheveu très bouclé, il doit franchir des dizaines de courbes et de boucles. Résultat&nbsp;: les pointes des cheveux de Type 4 sont naturellement plus sèches, plus fragiles et plus exposées à la casse.</p>
${h2('Le vrai problème&nbsp;: la rétention')}
<p>Imaginez remplir un seau percé au fond. L&rsquo;eau y entre &mdash; mais elle s&rsquo;échappe tout aussi vite. Vos cheveux fonctionnent de la même manière&nbsp;: la pousse a lieu à la racine, la perte se produit aux pointes. Si vous cassez autant que vous poussez, votre longueur ne change jamais. C&rsquo;est un problème de <em>rétention</em>, pas un problème de pousse &mdash; et c&rsquo;est une merveilleuse nouvelle, car la rétention dépend en grande partie de vous.</p>
${tip('Prenez aujourd&rsquo;hui une photo de vos cheveux entièrement étirés, puis recommencez dans 90 jours. Vous serez souvent surprise par une pousse que vous n&rsquo;aviez pas remarquée &mdash; parce que vous regardiez vos cheveux coiffés, et non leur véritable longueur.')}
${takeaway('Vos cheveux de Type 4 poussent exactement comme ceux de tout le monde &mdash; c&rsquo;est la casse discrète aux pointes qui efface vos progrès. Protéger votre longueur est la toute première priorité.')}
${quiz('q1','Pourquoi les cheveux de Type 4 semblent-ils souvent ne <em>pas</em> pousser&nbsp;?',
  ['Les follicules de Type 4 poussent plus lentement que les autres textures','La pousse a lieu à la racine, mais la casse aux pointes efface la longueur','Ils ne poussent que pendant la phase télogène'],1,
  '<b>Exactement.</b> Le rythme de pousse est à peu près le même pour toutes les textures. Le problème visible est la rétention &mdash; la longueur perdue par la casse aux pointes fragiles.')}
${reflect('r1','Quand vous regardez vos cheveux, y voyez-vous un problème de pousse ou un problème de rétention&nbsp;? Qu&rsquo;est-ce qui change si vous le voyez comme de la rétention&nbsp;?')}`;

L.l2 = ()=>`
${head('Module I · Comprendre la croissance','Pourquoi vos cheveux<br>semblent bloqués')}
<p class="lead">Je faisais tout ce que je lisais en ligne &mdash; mais mes cheveux restaient les mêmes. Personne ne m&rsquo;avait dit ce que je faisais de travers.</p>
<p>Si vos cheveux semblent bloqués à la même longueur depuis des mois &mdash; voire des années &mdash; ce n&rsquo;est pas une malédiction. C&rsquo;est un schéma. Voici les sept ennemis silencieux de la rétention de longueur, et comment traiter chacun d&rsquo;eux.</p>
<div class="steps">
  ${step(1,'La casse','L&rsquo;ennemi numéro un. Les cheveux cassés présentent des extrémités irrégulières, sans bulbe. <b>Solution&nbsp;:</b> démêlez uniquement sur cheveux mouillés ou humides, avec de la glisse et un peigne à dents larges, des pointes vers les racines.')}
  ${step(2,'La sécheresse chronique','Des cheveux qui cassent, paraissent ternes et semblent fragiles sont déshydratés. <b>Solution&nbsp;:</b> ajoutez une remise en hydratation en milieu de semaine &mdash; même une légère brume d&rsquo;eau pure est un début.')}
  ${step(3,'La manipulation excessive','Chaque geste, traction et nouveau coiffage est un stress mécanique. <b>Solution&nbsp;:</b> choisissez des coiffures à faible manipulation qui tiennent plusieurs jours, et gardez vos mains hors de vos boucles.')}
  ${step(4,'L&rsquo;accumulation de produits','Les beurres, crèmes et gels non éliminés obstruent les follicules et bloquent l&rsquo;hydratation. <b>Solution&nbsp;:</b> faites un nettoyage clarifiant au moins une fois par mois.')}
  ${step(5,'Le cuir chevelu négligé','Un cuir chevelu obstrué ou irrité ralentit la pousse à la source. <b>Solution&nbsp;:</b> massez pendant cinq minutes, deux à trois fois par semaine.')}
  ${step(6,'Les coiffures trop serrées','Les tresses et queues-de-cheval trop serrées tirent sur les follicules et provoquent une alopécie de traction. <b>Solution&nbsp;:</b> si ça fait mal à la pose, c&rsquo;est déjà trop serré.')}
  ${step(7,'Le stress chronique','Le stress augmente le cortisol et pousse les follicules au repos prématurément. <b>Solution&nbsp;:</b> un rituel de décompression quotidien &mdash; même dix minutes de marche ou de respiration.')}
</div>
${tip('Ne corrigez pas les sept à la fois. Évaluez honnêtement vos habitudes, identifiez votre principal coupable, et commencez par là. Un seul changement maintenu vaut bien plus que sept que vous abandonnez.')}
${takeaway('La stagnation n&rsquo;est pas une fatalité &mdash; c&rsquo;est généralement l&rsquo;accumulation de petites habitudes que l&rsquo;on peut corriger. En corriger ne serait-ce qu&rsquo;une peut complètement changer votre trajectoire.')}
${quiz('q2','Quelle est la manière la plus efficace d&rsquo;agir sur ces sept ennemis&nbsp;?',
  ['Corriger les sept en même temps pour des résultats plus rapides','Acheter de nouveaux produits pour chaque problème','Identifier votre principal coupable et changer cette seule chose avec constance'],2,
  '<b>Oui.</b> Un seul changement maintenu vaut mieux que sept abandonnés. Nommez votre plus grand ennemi et commencez par là.')}
${reflect('r2','Parmi les sept ennemis silencieux, lequel vous correspond le plus en ce moment&nbsp;? Quel est le seul changement auquel vous vous engagez en premier&nbsp;?')}`;

L.l3 = ()=>`
${head('Module I · Comprendre la croissance','Le cuir chevelu<br>est primordial')}
<p class="lead">Je n&rsquo;arrêtais pas d&rsquo;acheter produit sur produit pour mes longueurs. Personne ne m&rsquo;avait dit de commencer par le cuir chevelu.</p>
<p>Si vos cheveux sont une plante, votre cuir chevelu est la terre. Vous pouvez soigner les feuilles autant que vous voulez &mdash; mais si le sol est pauvre, la plante ne s&rsquo;épanouit jamais. La santé du cuir chevelu n&rsquo;est pas un détail. C&rsquo;est le fondement de tout.</p>
${h2('Pourquoi le cuir chevelu passe en premier')}
<div class="grid2">
  ${card('sage','La circulation sanguine','Les follicules ont besoin d&rsquo;un apport constant de nutriments et d&rsquo;oxygène par le sang. Une bonne circulation du cuir chevelu signifie des follicules bien nourris &mdash; c&rsquo;est pourquoi le massage est l&rsquo;un des moyens les mieux documentés pour stimuler la pousse.')}
  ${card('cream','Équilibre du sébum &amp; pH','Votre cuir chevelu se situe à un pH légèrement acide de 4,5&ndash;5,5. Des produits trop alcalins en éliminent le film protecteur. Choisissez des formules pour cheveux texturés et évitez le sodium lauryl sulfate en tête de liste des ingrédients.')}
</div>
<p>Comme votre peau et votre intestin, votre cuir chevelu héberge un microbiome de micro-organismes bénéfiques. Un lavage excessif, des produits agressifs et une chaleur trop intense le déstabilisent et déclenchent une inflammation discrète qui ralentit la pousse.</p>
${card('rose','Les signes d&rsquo;un cuir chevelu en mauvaise santé','Démangeaisons persistantes &middot; pellicules excessives (squames blanches ou grasses) &middot; rougeurs ou irritations visibles &middot; sensation de tiraillement ou de brûlure &middot; chute généralisée et excessive.')}
${h2('Votre rituel de soin du cuir chevelu')}
<div class="steps">

  ${step(2,'Nettoyer','Lavez toutes les une à deux semaines selon vos besoins &mdash; vous nettoyez le cuir chevelu, pas seulement les longueurs.')}
  ${step(3,'Observer','Une fois par semaine, prenez trente secondes pour examiner votre cuir chevelu et repérer les problèmes tôt.')}
</div>
${tip('Essayez un massage hebdomadaire à l&rsquo;huile tiède&nbsp;: une cuillère à soupe d&rsquo;huile de jojoba avec deux gouttes de menthe poivrée diluée. Massez cinq minutes, laissez poser 30, puis faites un shampoing. Vous sentirez la différence en quelques semaines.')}
${takeaway('Aucune routine au monde ne peut compenser un cuir chevelu négligé. Commencez par là, et tout le reste suivra.')}
${quiz('q3','Pourquoi le massage du cuir chevelu est-il si souvent recommandé pour la pousse&nbsp;?',
  ['Il fait pousser les cheveux au-delà de leur limite génétique','Il stimule la circulation sanguine, apportant nutriments et oxygène aux follicules','Il change définitivement votre type de cheveux'],1,
  '<b>Correct.</b> Le massage améliore la circulation à la source &mdash; l&rsquo;un des moyens les mieux documentés pour soutenir une pousse saine.')}
${reflect('r3','Comment évalueriez-vous honnêtement la santé de votre cuir chevelu aujourd&rsquo;hui&nbsp;? Quand l&rsquo;avez-vous vraiment regardé pour la dernière fois&nbsp;?')}`;

L.l4 = ()=>`
${head('Module I · Comprendre la croissance','Hydratation, protéines<br>&amp; équilibre')}
<p class="lead">Je mettais tellement de produits sur mes cheveux. Ils étaient lourds et sans vie. J&rsquo;avais besoin d&rsquo;équilibre, pas de plus.</p>
<p>Deux mots reviennent sans cesse dans l&rsquo;univers des cheveux naturels&nbsp;: <em>hydratation</em> et <em>protéines</em>. Ils travaillent ensemble, comme les deux plateaux d&rsquo;une balance. Comprendre ce que fait chacun vous épargnera des années d&rsquo;essais et d&rsquo;erreurs.</p>
<div class="grid2">
  ${card('sage','Ce que fait l&rsquo;hydratation','L&rsquo;eau est le seul véritable hydratant &mdash; ni l&rsquo;huile, ni le beurre. Une fibre hydratée est souple, élastique et résistante&nbsp;; une fibre déshydratée est fragile, terne et sujette à la casse.')}
  ${card('beige','Ce que font les protéines','La kératine est la protéine qui constitue vos cheveux. Les soins protéinés comblent les zones abîmées, fragilisées par la chaleur, la manipulation ou les produits chimiques. Une fibre bien protéinée est solide et structurée.')}
</div>
${card('rose','Les signes d&rsquo;un déséquilibre','<b>Trop d&rsquo;hydratation, trop peu de protéines&nbsp;:</b> des cheveux mous et spongieux qui s&rsquo;étirent sans revenir &mdash; ils manquent de structure. <b>Trop de protéines, trop peu d&rsquo;hydratation&nbsp;:</b> des cheveux raides et rigides qui cassent à la moindre tension &mdash; ils manquent de souplesse.')}
${h2('Les méthodes L.O.C. &amp; L.C.O.')}
<p><b>L.O.C.</b> = Liquide &middot; Huile (Oil) &middot; Crème. Commencez par un liquide (de l&rsquo;eau ou un leave-in léger), scellez avec une huile, puis fixez le tout avec une crème plus riche. <b>L.C.O.</b> = Liquide &middot; Crème &middot; Huile (Oil) &mdash; d&rsquo;abord le liquide, puis la crème pour hydrater en profondeur, et l&rsquo;huile par-dessus. Les cheveux de Type 4C très serrés répondent souvent mieux au L.C.O.</p>
${tip('Le test d&rsquo;élasticité&nbsp;: humidifiez une fibre propre et étirez-la doucement. Elle s&rsquo;étire et revient &mdash; l&rsquo;équilibre est bon. Elle casse aussitôt &mdash; elle a besoin d&rsquo;hydratation. Elle s&rsquo;étire mais ne revient pas &mdash; elle a besoin de protéines.')}
${takeaway('Vos cheveux ont besoin d&rsquo;hydratation ET de protéines &mdash; ni trop, ni trop peu. L&rsquo;équilibre est le secret de cheveux à la fois solides et souples.')}
${quiz('q4','Vos cheveux s&rsquo;étirent quand ils sont mouillés mais ne reviennent pas, et semblent spongieux. De quoi ont-ils probablement besoin&nbsp;?',
  ['Plus d&rsquo;hydratation','Plus de protéines','Plus d&rsquo;huile'],1,
  '<b>Exact.</b> Des cheveux spongieux qui s&rsquo;étirent trop sans revenir signalent un déficit de protéines. Ils ont besoin de structure, pas de plus d&rsquo;hydratation.')}
${reflect('r4','Faites le test d&rsquo;élasticité sur une fibre. Que vous a-t-il appris &mdash; vos cheveux penchent-ils vers un besoin d&rsquo;hydratation ou de protéines en ce moment&nbsp;?')}`;

L.l5 = ()=>`
${head('Module I · Comprendre la croissance','Alimentation, sommeil<br>&amp; stress')}
<p class="lead">Je prenais soin de mes cheveux de l&rsquo;extérieur. J&rsquo;avais oublié que la pousse vient de l&rsquo;intérieur.</p>
<p>Nous parlons sans cesse de produits et de techniques. Mais aucune crème ne peut compenser un corps qui tourne avec des carences, de l&rsquo;épuisement ou un stress constant. La pousse des cheveux est un processus biologique &mdash; et elle dépend fortement de ce que vous apportez à votre corps.</p>
${h2('Les nutriments clés pour la pousse')}
<table class="lux"><thead><tr><th>Nutriment</th><th>Pourquoi c&rsquo;est important</th><th>Où le trouver</th></tr></thead><tbody>
  <tr><td><span class="nm">Biotine (B7)</span></td><td>Soutient la production de kératine</td><td>Œufs, noix, graines de tournesol</td></tr>
  <tr><td><span class="nm">Zinc</span></td><td>Essentiel au fonctionnement du follicule</td><td>Graines de courge, huîtres, légumineuses</td></tr>
  <tr><td><span class="nm">Fer</span></td><td>Une cause de chute souvent ignorée</td><td>Lentilles, épinards (+ vitamine C)</td></tr>
  <tr><td><span class="nm">Vitamine D</span></td><td>Un faible taux est lié à l&rsquo;alopécie</td><td>Soleil, œufs (consultez un professionnel)</td></tr>
  <tr><td><span class="nm">Oméga-3</span></td><td>Nourrit les follicules de l&rsquo;intérieur</td><td>Saumon, sardines, lin, noix</td></tr>
  <tr><td><span class="nm">Silice</span></td><td>Renforce la solidité de la fibre</td><td>Avoine, bananes</td></tr>
</tbody></table>
<div class="grid2">
  ${card('cream','Cortisol &amp; pousse','L&rsquo;hormone du stress est un perturbateur discret mais puissant. Sous l&rsquo;effet d&rsquo;un stress chronique, le corps détourne l&rsquo;énergie des processus non essentiels comme la pousse, et les follicules basculent prématurément en repos &mdash; provoquant une chute quelques semaines plus tard (effluvium télogène).')}
  ${card('sage','Sommeil &amp; réparation','Pendant le sommeil profond, votre corps libère l&rsquo;hormone de croissance et répare les cellules &mdash; follicules compris. Dormir régulièrement moins de six heures interrompt ce processus. Protégez vos pointes avec du satin la nuit.')}
</div>
${tip('Créez un rituel du soir tout simple&nbsp;: bonnet en satin, une tisane apaisante, et cinq minutes sans écran. Vos cheveux et votre esprit vous en remercieront.')}
${takeaway('Vos cheveux reflètent votre santé intérieure. Nourrissez votre corps, gérez votre stress et protégez votre sommeil &mdash; c&rsquo;est le soin le plus profond que vous puissiez offrir à vos cheveux.')}
${quiz('q5','Pourquoi un stress chronique peut-il provoquer une chute plusieurs semaines plus tard&nbsp;?',
  ['Il assèche directement la fibre capillaire','Le cortisol pousse prématurément les follicules en phase de repos (télogène)','Il retire le fer de votre alimentation'],1,
  '<b>Oui.</b> C&rsquo;est l&rsquo;effluvium télogène &mdash; le stress fait basculer les follicules en repos prématurément, et la chute apparaît des semaines plus tard.')}
${reflect('r5','Quel est votre maillon le plus faible en ce moment &mdash; alimentation, sommeil ou stress&nbsp;? Quel petit changement réaliste pouvez-vous faire cette semaine&nbsp;?')}`;

/* ---------- MODULE II ---------- */
L.l6 = ()=>`
${head('Module II · L’état d’esprit','La patience&nbsp;:<br>la compétence la plus difficile')}
<p class="lead">J&rsquo;ai failli abandonner à la semaine 8. Aujourd&rsquo;hui, mes cheveux m&rsquo;arrivent aux épaules. Je pense souvent à celle que j&rsquo;aurais été si je m&rsquo;étais arrêtée.</p>
<p class="dear">Chère toi,</p>
<p>Il y a une chose que personne ne dit assez fort à propos de ce parcours&nbsp;: c&rsquo;est difficile. Pas techniquement difficile &mdash; <em>émotionnellement</em> difficile. Difficile parce que vous travaillez, vous changez vos habitudes, vous y croyez &mdash; et puis vous vous regardez dans le miroir six semaines plus tard en vous demandant si cela en vaut vraiment la peine. Ce moment &mdash; celui où vous vous demandez s&rsquo;il faut continuer &mdash; est le plus dangereux et le plus décisif de tout votre parcours.</p>
${h2('Reconsidérer la lenteur comme une force')}
<p>La pousse des cheveux est une croissance <em>composée</em>. Chaque mois compte&nbsp;: 1,5&nbsp;cm en janvier, 1,5&nbsp;cm en février &mdash; en fin d&rsquo;année vous êtes à 15&ndash;18&nbsp;cm, et en deux ans, à plus de 30. Mais abandonnez à la semaine six et recommencez de zéro, et vous repartirez toujours du même point. La semaine six est précisément le moment où les choses commencent à fonctionner &mdash; et exactement celui où la plupart des gens abandonnent.</p>
${h2('Tenir la distance')}
<p>Célébrez le processus, pas seulement le résultat. Chaque jour de lavage accompli, chaque massage du cuir chevelu, chaque nuit en satin est une victoire &mdash; notez-les. Tenez un album &laquo;&nbsp;avant&nbsp;&raquo;&nbsp;: une photo, le même fond, une fois par mois. Et parlez-vous comme vous parleriez à votre meilleure amie. Les femmes qui réussissent ne sont pas celles qui ont les meilleurs produits &mdash; ce sont celles qui ont décidé de ne pas abandonner.</p>
${tip('Demandez-vous chaque semaine&nbsp;: ai-je fait quelque chose de bien pour mes cheveux&nbsp;? Si oui, c&rsquo;était une semaine réussie. La perfection n&rsquo;est pas l&rsquo;objectif &mdash; la constance, si.')}
${affirm('Je fais confiance au rythme de ma propre croissance. Chaque centimètre est une victoire, même quand je ne peux pas encore le voir.')}
${takeaway('La patience n&rsquo;est pas passive &mdash; c&rsquo;est une décision active que vous renouvelez chaque semaine. Et c&rsquo;est la patience, plus que tout produit, qui fait pousser vos cheveux.')}
${quiz('q6','Pourquoi la &laquo;&nbsp;semaine six&nbsp;&raquo; est-elle décrite comme le moment le plus dangereux du parcours&nbsp;?',
  ['C&rsquo;est le moment où les cheveux cessent complètement de pousser','C&rsquo;est exactement là où les résultats commencent à se voir &mdash; et où la plupart des gens abandonnent','C&rsquo;est le moment où il faut changer tous vos produits'],1,
  '<b>Exactement.</b> La croissance composée commence tout juste à devenir visible à ce moment-là. Abandonner vous remet à zéro.')}
${reflect('r6','Pensez à une routine capillaire que vous avez abandonnée. Jusqu&rsquo;où êtes-vous allée&nbsp;? Que se serait-il passé si vous étiez restée un mois de plus&nbsp;?')}`;

L.l7 = ()=>`
${head('Module II · L’état d’esprit','La constance<br>avant la perfection')}
<p class="lead">J&rsquo;avais la routine parfaite sur le papier. Mais elle était si compliquée que je l&rsquo;abandonnais à chaque fois au bout de deux semaines.</p>
<p class="dear">Chère toi,</p>
<p>Presque toutes les femmes font la même erreur au début &mdash; moi y compris. Nous partons à la recherche de la routine <em>parfaite</em>&nbsp;: un jour de lavage de quatre heures le dimanche, des protéines le mercredi, un bain d&rsquo;huile chaude le vendredi. Cela paraît magnifique sur le papier. Puis la vie arrive, le dimanche est chargé, le mercredi vous êtes épuisée &mdash; et vous vous dites que vous recommencerez lundi. Mais il n&rsquo;y a pas de prochain lundi dans la pousse des cheveux. Il n&rsquo;y a qu&rsquo;aujourd&rsquo;hui.</p>
${h2('Pourquoi la constance imparfaite l&rsquo;emporte')}
<p>Une routine suivie de façon imparfaite pendant 90 jours crée de vrais résultats. Une routine parfaite abandonnée au bout de 10 jours ne crée que de la frustration. Vos cheveux ne connaissent pas la perfection &mdash; ils connaissent la répétition, la régularité, la prévisibilité. Ce sont les signaux auxquels ils répondent.</p>
${h2('Construire des boucles d&rsquo;habitude')}
<p>Votre cerveau retient des <em>boucles</em>, pas des actions isolées. Une boucle = un déclencheur + une action + une récompense. Le dimanche matin, vous mettez votre playlist préférée (déclencheur), vous commencez le jour de lavage (action), vous regardez une série pendant que votre soin profond agit (récompense). Lors d&rsquo;une semaine chargée, la constance peut simplement être&nbsp;: un brumisateur d&rsquo;eau et une goutte d&rsquo;huile sur vos pointes, un bonnet en satin, votre litre et demi d&rsquo;eau. Cela suffit &mdash; car la constance, ce n&rsquo;est pas tout faire, c&rsquo;est ne jamais tout abandonner.</p>
${tip('Créez un &laquo;&nbsp;mode minimal&nbsp;&raquo; pour les semaines difficiles &mdash; trois gestes que vous pouvez toujours assurer&nbsp;: bonnet en satin, brumisateur hydratant, pas de manipulation excessive.')}
<div class="cal cal-exercise"><div class="cal-h">${I.pen}<span>Invitation à la réflexion</span></div><p>Qu&rsquo;est-ce qui vous pousse à abandonner votre routine &mdash; la fatigue, le temps, le découragement&nbsp;? Écrivez sans jugement. À quoi ressemblerait concrètement une version simplifiée et tenable pour vous&nbsp;?</p></div>
${takeaway('Une routine imparfaite suivie pendant 90 jours transforme vos cheveux. Une routine parfaite abandonnée au bout de 10 jours ne laisse que de la frustration.')}
${quiz('q7','À quoi vos cheveux répondent-ils réellement&nbsp;?',
  ['À des routines coûteuses et complexes','À la répétition, la régularité et la prévisibilité','À des changements fréquents de produits'],1,
  '<b>Oui.</b> Les cheveux répondent à des signaux constants dans le temps &mdash; pas à la perfection ni à la nouveauté.')}
${reflect('r7','Concevez votre &laquo;&nbsp;mode minimal&nbsp;&raquo; personnel &mdash; les trois gestes que vous pouvez garder même lors de votre pire semaine.')}`;

L.l8 = ()=>`
${head('Module II · L’état d’esprit','Votre chapitre 1 n’est pas<br>son chapitre 10')}
<p class="lead">Les réseaux sociaux m&rsquo;ont donné de l&rsquo;inspiration et de la déprime en même temps.</p>
<p class="dear">Chère toi,</p>
<p>Vous faites défiler votre écran. Vous voyez de beaux cheveux &mdash; longs, épais, définis, lumineux &mdash; et quelque chose s&rsquo;éveille&nbsp;: de l&rsquo;admiration mêlée à quelque chose qui ressemble à de la douleur. <em>Pourquoi elle et pas moi&nbsp;?</em> Parlons-en honnêtement.</p>
${h2('Le piège de la comparaison')}
<p>Ce que vous voyez en ligne est le résultat, rarement le processus &mdash; pas les deux années de routine tranquille, les mauvais jours de lavage, le doute. Comparer votre début au résultat de quelqu&rsquo;un, c&rsquo;est comparer une graine à un arbre. La graine deviendra un arbre &mdash; mais pas en fixant l&rsquo;arbre du regard.</p>
${card('sage','Pourquoi le 4C et le 4A ne sont pas comparables','Le type 4C est le plus serré, avec le plus fort rétrécissement (les cheveux paraissent bien plus courts qu&rsquo;ils ne le sont), la répartition de sébum la plus limitée, et une plus grande sensibilité à la sécheresse. Ce n&rsquo;est pas que le 4C pousse moins &mdash; il a besoin d&rsquo;une stratégie plus ciblée et d&rsquo;encore plus de patience.')}
${card('rose','Changer de produits toutes les deux semaines','L&rsquo;une des erreurs les plus coûteuses que la comparaison engendre. Les cheveux ne répondent pas en une semaine &mdash; ils répondent en 60 à 90 jours. Le changement permanent rend impossible toute véritable évaluation.')}
${tip('Si faire défiler votre fil vous laisse triste plutôt qu&rsquo;inspirée, c&rsquo;est une information précieuse. Vous avez le droit de trier vos abonnements &mdash; cultivez votre fil comme vous cultivez votre routine.')}
${takeaway('Vous n&rsquo;êtes pas en retard. Vous êtes à votre propre chapitre &mdash; et votre chapitre, écrit avec votre constance et votre patience, sera le plus beau de tous.')}
${quiz('q8','Combien de temps faut-il laisser à un nouveau produit ou à une nouvelle routine avant de juger&nbsp;?',
  ['1 à 2 semaines','60 à 90 jours','Un seul jour de lavage'],1,
  '<b>Correct.</b> Les cheveux répondent sur 60 à 90 jours. Changer toutes les deux semaines rend toute vraie évaluation impossible.')}
${reflect('r8','À qui comparez-vous le plus vos cheveux&nbsp;? En quoi cette comparaison vous sert-elle &mdash; ou vous nuit-elle &mdash; réellement&nbsp;?')}`;

L.l9 = ()=>`
${head('Module II · L’état d’esprit','Votre relation<br>émotionnelle')}
<p class="lead">Mes cheveux n&rsquo;étaient pas que des cheveux. Ils portaient tout ce qu&rsquo;on m&rsquo;avait appris à ressentir à mon sujet.</p>
<p class="dear">Chère toi,</p>
<p>Les cheveux des femmes noires ne sont pas que des cheveux. Ils portent une histoire &mdash; des générations de messages, certains dits à voix haute, d&rsquo;autres absorbés à travers les silences et les regards&nbsp;: que le lisse est mieux, que le maîtrisable est mieux, que le dompté est mieux.</p>
${h2('Désapprendre la honte')}
<p>La honte capillaire &mdash; cette croyance profonde que votre texture naturelle est un problème à résoudre &mdash; est l&rsquo;un des héritages les plus douloureux que portent beaucoup de femmes noires. La désapprendre est un travail patient, tendre, non linéaire. Mais cela commence par une décision&nbsp;: choisir de regarder vos cheveux avec curiosité plutôt qu&rsquo;avec jugement. Au lieu de <em>pas encore</em>, demandez&nbsp;: <em>que me disent-ils aujourd&rsquo;hui&nbsp;?</em> Vos cheveux parlent &mdash; apprendre leur langage, c&rsquo;est apprendre à vous connaître.</p>
${caution('Quand le soin devient anxiété','Si chaque matin devant le miroir est une appréhension, si un mauvais jour de cheveux fait dérailler votre confiance, si vous évitez des événements à cause de vos cheveux &mdash; ce n&rsquo;est plus du soin. C&rsquo;est de l&rsquo;anxiété déguisée en routine. L&rsquo;objectif n&rsquo;est pas des cheveux parfaits&nbsp;; c&rsquo;est une relation paisible et aimante avec vos cheveux, dans tous leurs états.')}
${affirm('Mes cheveux ne sont pas un problème à résoudre &mdash; ils sont une extension de qui je suis. Et celle que je suis mérite d&rsquo;être aimée, exactement telle qu&rsquo;elle est.')}
${takeaway('Prendre soin de vos cheveux, c&rsquo;est apprendre à prendre soin de vous. La relation la plus importante de ce parcours n&rsquo;est pas celle avec vos produits &mdash; c&rsquo;est celle avec vous.')}
${reflect('r9','Quel message sur vos cheveux avez-vous absorbé en grandissant&nbsp;? Est-il encore vrai pour vous &mdash; ou est-il temps de le déposer&nbsp;?')}`;

L.l10 = ()=>`
${head('Module II · L’état d’esprit','Confiance &amp;<br>attentes réalistes')}
<p class="lead">Le jour où j&rsquo;ai cessé de vouloir les cheveux d&rsquo;une autre, j&rsquo;ai enfin commencé à aimer les miens.</p>
<p class="dear">Chère toi,</p>
<p>Clôturons cette section avec la chose la plus libératrice que vous puissiez faire pour vos cheveux&nbsp;: décider que vous êtes <em>suffisante</em>, dès maintenant, exactement là où vous êtes.</p>
${h2('Des objectifs ancrés dans la biologie')}
<p>Un à un centimètre et demi par mois &mdash; voilà la réalité biologique, fixée par votre génétique et vos follicules, pas par votre carte bancaire. Aucun produit ne peut la dépasser durablement. Ce que vous <em>pouvez</em> faire, c&rsquo;est veiller à ce que chaque centimètre qui pousse reste. Voilà l&rsquo;objectif&nbsp;: non pas pousser plus vite &mdash; mais retenir davantage.</p>
${h2('La confiance au-delà de la longueur')}
<p>Célébrez les centimètres&nbsp;: 3&nbsp;cm en deux mois, c&rsquo;est réel, 6&nbsp;cm en quatre mois, c&rsquo;est visible, 12&nbsp;cm en un an changent toute une coiffure. Et si votre confiance dépend de la longueur de vos cheveux, vous ne serez jamais en paix &mdash; il y a toujours un prochain palier. La vraie confiance, c&rsquo;est de vous regarder aujourd&rsquo;hui, les cheveux dans n&rsquo;importe quel état, et de dire&nbsp;: <em>je suis belle. Je suis en chemin.</em> Les deux sont vrais en même temps.</p>
${tip('Écrivez votre propre définition de la réussite capillaire &mdash; pas celle d&rsquo;internet, pas celle de votre cousine. La vôtre. Placez-la quelque part où vous la verrez chaque matin.')}
${affirm('Je n&rsquo;attends pas que mes cheveux soient longs pour être belle. Je suis belle maintenant &mdash; en train de pousser, de me construire, exactement là où je suis.')}
${takeaway('Vos objectifs capillaires méritent d&rsquo;être enracinés dans la biologie de votre corps &mdash; et votre confiance mérite d&rsquo;exister indépendamment de tout résultat.')}
${quiz('q10','Quelle attente de pousse mensuelle réaliste pour ancrer vos objectifs&nbsp;?',
  ['3 à 4 cm par mois avec les bons produits','1 à 1,5 cm par mois, fixés par la génétique','Autant que votre influenceuse préférée'],1,
  '<b>Exact.</b> ~1 à 1,5 cm/mois est la norme biologique. Aucun produit ne la dépasse de façon fiable &mdash; le vrai levier est donc la rétention.')}
${reflect('r10','Écrivez votre propre définition de la réussite capillaire &mdash; avec vos mots, pour votre vie, pas celle de quelqu&rsquo;un d&rsquo;autre.')}`;

/* ---------- MODULE III ---------- */
L.l11 = ()=>`
${head('Module III · Le système pratique','Construire votre<br>routine de croissance')}
<p class="lead">Avant, j&rsquo;avais soit trop de routine, soit aucune. Trouver le juste milieu a tout changé.</p>
<p>Une routine de croissance n&rsquo;est pas une liste de produits. C&rsquo;est une <em>architecture de soin</em> &mdash; un cadre qui s&rsquo;adapte à votre vie et qui, répété semaine après semaine, crée des résultats durables.</p>
${h2('Votre structure hebdomadaire')}
<div class="grid2">
  ${card('sage','Jour de lavage &middot; 1&ndash;2&times;/semaine','Pré-poo &rarr; shampoing &rarr; après-shampoing &rarr; soin profond (20&ndash;30 min) &rarr; démêlage &rarr; hydratation (L.O.C./L.C.O.) &rarr; coiffage.')}
  ${card('cream','Rafraîchissement &middot; 2&ndash;3&times;/semaine','Un léger brumisage d&rsquo;eau sur les longueurs, quelques gouttes d&rsquo;huile légère sur les pointes, un recoiffage minimal seulement si besoin.')}
</div>
${card('beige','Massage du cuir chevelu &middot; 2&ndash;3&times;/semaine','Cinq minutes de massage du bout des doigts, avec ou sans une huile légère &mdash; la circulation à la source.')}
${h2('Quand le temps manque')}
<p>Une semaine minimaliste fonctionne quand même&nbsp;: <b>Lundi</b> &mdash; rafraîchissement rapide (eau + huile, 5 min). <b>Mercredi</b> &mdash; massage du cuir chevelu (5 min). <b>Vendredi/Samedi</b> &mdash; jour de lavage complet. <b>Chaque soir</b> &mdash; bonnet en satin. Ne sautez jamais deux jours de lavage consécutifs&nbsp;; une semaine se rattrape, deux et la sécheresse s&rsquo;installe. Si vous n&rsquo;avez qu&rsquo;une heure&nbsp;: shampoing + soin profond + un L.O.C. de base, c&rsquo;est la routine minimale viable.</p>
${tip('Préparez votre panier de jour de lavage la veille au soir &mdash; produits, serviette en microfibre, pinces. Le matin, vous n&rsquo;avez plus qu&rsquo;à commencer. Moins de friction, plus de régularité.')}
${takeaway('Une routine réaliste que vous gardez vaut cent routines idéales que vous abandonnez. Construisez pour votre vraie vie, pas pour votre vie parfaite.')}
${quiz('q11','Quel est le bon ordre du cadre de jour de lavage&nbsp;?',
  ['Shampoing &rarr; coiffage &rarr; soin profond &rarr; démêlage','Pré-poo &rarr; shampoing &rarr; après-shampoing &rarr; soin profond &rarr; démêlage &rarr; hydratation &rarr; coiffage','Soin profond &rarr; shampoing &rarr; hydratation &rarr; pré-poo'],1,
  '<b>Oui.</b> D&rsquo;abord le pré-poo pour protéger, nettoyer, après-shampoing, soin profond, démêler avec de la glisse, puis hydrater (L.O.C./L.C.O.) et coiffer.')}
${reflect('r11','Esquissez votre routine hebdomadaire réaliste &mdash; pour votre vrai emploi du temps, pas votre emploi du temps idéal. Quand aura lieu le jour de lavage&nbsp;?')}`;

L.l12 = ()=>`
${head('Module III · Le système pratique','Le coiffage protecteur<br>pour la rétention')}
<p class="lead">Pendant des années, je me cachais derrière mes tresses. Je ne savais pas qu&rsquo;elles pouvaient aussi m&rsquo;aider à pousser.</p>
<p>Il y a une différence entre porter un coiffage protecteur pour <em>cacher</em> vos cheveux et le porter comme une stratégie active de rétention. L&rsquo;un vient de l&rsquo;évitement&nbsp;; l&rsquo;autre de l&rsquo;intention.</p>
<div class="grid2">
  ${card('sage','Box braids / tresses sans nœuds','Excellentes pour la rétention&nbsp;; 4&ndash;6 semaines maximum. Le sans-nœud exerce moins de tension sur la racine.')}
  ${card('cream','Vanilles (twists à deux brins)','Idéales pour de courtes périodes (1&ndash;2 semaines)&nbsp;; faciles à rafraîchir sans tout défaire.')}
  ${card('beige','Chignons bas','Simples et quotidiens, parfaits pour les semaines chargées &mdash; évitez les élastiques à fermoir métallique.')}
  ${card('sage','Perruques &amp; extensions','Protectrices si elles sont bien posées, sans tension sur les contours.')}
</div>
${caution('La règle d&rsquo;or sur la durée','Jamais plus de 6 à 8 semaines sans défaire le coiffage et inspecter vos cheveux. Plus longtemps risque l&rsquo;emmêlement, la casse et un cuir chevelu négligé. Surveillez&nbsp;: douleur ou tension aux contours, démangeaisons persistantes, plaques squameuses ou rouges, ou une casse visible au démontage.')}
${h2('Le soin du cuir chevelu sous le coiffage')}
<p>Au minimum&nbsp;: un léger spray d&rsquo;eau ou d&rsquo;aloès sur le cuir chevelu visible deux fois par semaine&nbsp;; une huile légère (jojoba, argan) une à deux fois par semaine&nbsp;; et un massage doux entre les tresses. Le coiffage protège vos longueurs &mdash; vous prenez toujours soin du cuir chevelu.</p>
${tip('Avant de défaire un coiffage, huilez toute la longueur de vos cheveux. Cela assouplit les nœuds et rend le démêlage bien plus facile &mdash; réduisant nettement la casse pendant la transition.')}
${takeaway('Un coiffage protecteur bien géré est l&rsquo;une des stratégies de rétention les plus efficaces qui soient &mdash; à condition de ne jamais négliger le cuir chevelu en dessous.')}
${quiz('q12','Quelle est la durée maximale recommandée pour garder un coiffage protecteur&nbsp;?',

L.l13 = ()=>`

L.l14 = ()=>`

/* ============================================================
   SMALL TEMPLATE HELPERS
============================================================ */
function head(crumb,title){ return '<div class="kicker">'+crumb+'</div><h1 class="ch">'+title+'</h1><hr class="ch-rule">'; }
function step(n,t,p){ return '<div class="step"><div class="num">'+n+'</div><div class="bd"><div class="t">'+t+'</div><p>'+p+'</p></div></div>'; }
function card(cls,t,p){ return '<div class="card '+cls+'"><div class="ct">'+t+'</div><p>'+p+'</p></div>'; }
function checkList(group,items){
  let h='<ul class="check">';
  items.forEach((it,i)=>{ const id=group+'_'+i;
    h+='<li data-chk="'+id+'" onclick="toggleChk(\''+id+'\')"><span class="cb">'+I.check+'</span><span class="ct">'+it+'</span></li>'; });
  return h+'</ul>';
}
function trackRow(loc,key){
  let h='<tr><td class="loc">'+loc+'</td>';
  ['w1','w4','w8','w13'].forEach(w=>{ const id=key+'_'+w;
    h+='<td><input type="text" data-trk="'+id+'" placeholder="–" oninput="saveTrack(\''+id+'\',this.value)"></td>'; });
  return h+'</tr>';
}

function renderRecipes(filter){
  const badge={easy:'<span class="badge b-easy">Facile</span>',mod:'<span class="badge b-mod">Modérée</span>',adv:'<span class="badge b-adv">Avancée</span>'};
  let h='';
  RECIPES.forEach(r=>{
    const hp = r.t.toLowerCase().includes('porosité');
    const show = filter==='all' || filter===r.d || (filter==='hp'&&hp);
    if(!show) return;
    let ig=''; r.ing.forEach(x=>ig+='<tr><td>'+x[0]+'</td><td class="q">'+x[1]+'</td></tr>');
    let st=''; r.m.forEach(s=>st+='<li>'+s+'</li>');
    h+='<div class="recipe"><div class="rtop">'+badge[r.d]+'<span class="badge b-type">'+r.t+'</span></div>'+
       '<div class="rname">'+r.n+'</div><div class="rben">'+r.ben+'</div>'+
       '<div class="rb"><div><div class="rh">Ingrédients</div><table class="ig">'+ig+'</table></div>'+
       '<div><div class="rh">Méthode</div><ol class="rsteps">'+st+'</ol></div></div>'+
       '<div class="rmeta"><span class="chip"><b>Se garde</b>'+r.keeps+'</span><span class="chip"><b>Fréquence</b>'+r.use+'</span></div></div>';
  });
  return h;
}
function filterRecipes(f){
  document.querySelectorAll('#recFilters .filt').forEach(b=>b.classList.toggle('on',b.dataset.f===f));
  document.getElementById('recipeList').innerHTML=renderRecipes(f);
}

/* ============================================================
   STATE + PERSISTENCE
============================================================ */
const KEY='schic_grow_course_fr';
let state={done:{},reflect:{},chk:{},track:{},quiz:{},quizPass:{},current:'welcome'};
function load(){ try{ const s=JSON.parse(localStorage.getItem(KEY)); if(s) state=Object.assign(state,s); if(!state.quizPass) state.quizPass={}; }catch(e){} }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
load();

/* flat ordered lesson ids for prev/next */
const FLAT=[]; MODULES.forEach(m=>m.lessons.forEach(l=>FLAT.push(l.id)));

/* ============================================================
   SEQUENTIAL GATING (university-style)
   A lesson unlocks only when the PREVIOUS counted lesson is done.
   A lesson can be marked done only when every knowledge-check in it is answered correctly.
============================================================ */
function isUnlocked(id){
  if(id==='welcome') return true;
  if(id==='certificate') return COUNTED.every(x=>state.done[x]);
  const idx=COUNTED.indexOf(id);
  if(idx<=0) return true;                 // l1 (first lesson) always open
  return !!state.done[COUNTED[idx-1]];    // need the previous lesson completed
}
/* are all quizzes in the currently-rendered lesson answered correctly? */
function lessonQuizzesPassed(){
  const qs=document.querySelectorAll('#content [data-quiz]');
  for(const b of qs){ if(!state.quizPass[b.dataset.quiz]) return false; }
  return true;
}
/* is every reflection in the current lesson written? */
function lessonReflectionsFilled(){
  const ts=document.querySelectorAll('#content textarea[data-reflect]');
  for(const t of ts){ if(!(t.value||'').trim()) return false; }
  return true;
}

/* ============================================================
   RENDER
============================================================ */
function buildNav(){
  let h='';
  MODULES.forEach(m=>{
    h+='<div class="modgrp"><div class="modtitle"><span class="mt-i">'+I.leaf+'</span>'+m.eyebrow+' · '+m.label+'</div>';
    m.lessons.forEach(l=>{
      const done=state.done[l.id];
      const locked=!done && !isUnlocked(l.id);
      h+='<div class="lk'+(done?' done':'')+(locked?' locked':'')+(state.current===l.id?' active':'')+'" data-lk="'+l.id+'" onclick="go(\''+l.id+'\')">'+
         '<span class="dot">'+I.check+I.lock+'</span><span class="tt">'+(l.no?'<b style="color:var(--gold-deep);font-weight:600">'+l.no+'.</b> ':'')+l.title+'</span></div>';
    });
    h+='</div>';
  });
  document.getElementById('sbNav').innerHTML=h;
}
function buildModList(){
  const el=document.getElementById('modlist'); if(!el)return;
  let h='';
  MODULES.filter(m=>!['start','end'].includes(m.key)).forEach(m=>{
    const total=m.lessons.length, done=m.lessons.filter(l=>state.done[l.id]).length;
    const locked=!isUnlocked(m.lessons[0].id);
    const meta = locked ? '🔒 Terminez le module précédent pour débloquer' : (done+' / '+total+' terminées');
    h+='<div class="modcard'+(locked?' locked':'')+'" onclick="go(\''+m.lessons[0].id+'\')"><div class="mc-no">'+m.no+'</div>'+
       '<div class="mc-b"><div class="mc-e">'+m.eyebrow+'</div><div class="mc-t">'+m.label+'</div>'+
       '<p>'+modBlurb(m.key)+'</p><div class="mc-meta">'+meta+'</div></div></div>';
  });
  el.innerHTML=h;
}
function modBlurb(k){return {
  m1:'La science derrière chaque centimètre &mdash; cycles de pousse, rétention, cuir chevelu, équilibre et nutrition de l&rsquo;intérieur.',
  m2:'Patience, constance et bienveillance envers soi &mdash; le travail intérieur qui vous maintient vraiment dans la course.',
  m3:'Votre routine, le coiffage protecteur, les ingrédients fondés sur des preuves, ce qu&rsquo;il faut arrêter, et comment suivre vos résultats.',
  m4:'Transformez tout en habitudes avec un plan guidé et mesurable de 13 semaines.',
  m5:'Quinze soins maison formulés pour les cheveux de Type 4, faits de vos propres mains.'
}[k]||'';}

function updateProgress(){
  const total=COUNTED.length;
  const done=COUNTED.filter(id=>state.done[id]).length;
  const pct=Math.round(done/total*100);
  const circ=2*Math.PI*22;
  const fill=document.getElementById('ringFill');
  fill.setAttribute('stroke-dasharray',circ);
  fill.setAttribute('stroke-dashoffset',circ*(1-done/total));
  document.getElementById('ringTxt').textContent=pct+'%';
  document.getElementById('progSub').textContent = pct===0?"Commençons" : pct===100?'Terminé ! 🌿' : done+' sur '+total+' leçons';
}

function render(id){
  if(!L[id]) id='welcome';
  state.current=id; save();
  document.getElementById('content').innerHTML=L[id]();
  // SCHICGIRL video lesson — injected after the title rule on every teaching lesson (not on exams)
  if(COUNTED.includes(id) && !/exam$/.test(id)){
    const rule=document.querySelector('#content .ch-rule');
    if(rule) rule.insertAdjacentHTML('afterend', video(id, lessonTitle(id)));
  }
  // crumb
  let mlabel=''; MODULES.forEach(m=>m.lessons.forEach(l=>{if(l.id===id)mlabel=m.label;}));
  document.getElementById('crumb').innerHTML='POUSSE · <b>'+mlabel+'</b>';
  // active nav
  document.querySelectorAll('.lk').forEach(n=>n.classList.toggle('active',n.dataset.lk===id));
  // post-render hydration
  if(id==='welcome') buildModList();
  if(id==='recipes') filterRecipes('all');
  hydrateReflections();
  hydrateChecks();
  hydrateTracks();
  hydrateQuizzes();
  addCompleteZone(id);
  window.scrollTo(0,0);
}
function go(id){
  if(!isUnlocked(id)){
    toast(id==='certificate' ? '🔒 Terminez chaque leçon pour débloquer votre certificat' : '🔒 Terminez d’abord la leçon précédente');
    return;
  }
  render(id); closeMenu();
}

/* the gated completion box for a counted lesson */
function renderGate(id){
  if(state.done[id]){
    return '<div class="complete-zone"><div class="cz-t">✓ Leçon terminée — magnifiquement accompli.</div>'+
      '<button class="btn" onclick="toggleDone(\''+id+'\')">Marquer comme non terminée</button></div>';
  }
  const hasQuiz=document.querySelectorAll('#content [data-quiz]').length>0;
  const hasRefl=document.querySelectorAll('#content textarea[data-reflect]').length>0;
  const isExam=/exam$/.test(id);
  if(hasQuiz && !lessonQuizzesPassed()){
    const msg=isExam ? 'Répondez correctement à chaque question de l&rsquo;examen pour réussir ce module.' : 'Répondez correctement au quiz pour débloquer la leçon suivante.';
    return '<div class="complete-zone locked" id="czone"><div class="cz-t">'+msg+'</div>'+
      '<button class="btn" disabled>'+(isExam?'Réussir &amp; débloquer le module suivant →':'Terminer et continuer →')+'</button></div>';
  }
  if(hasRefl && !lessonReflectionsFilled()){
    return '<div class="complete-zone locked" id="czone"><div class="cz-t">Écrivez votre réflexion ci-dessus pour terminer cette leçon.</div>'+
      '<button class="btn" disabled>Terminer et continuer →</button></div>';
  }
  const cta=isExam?'Réussir &amp; débloquer le module suivant →':'Terminer et continuer →';
  const htxt=isExam?'Module réussi — bravo !':(hasQuiz?'Correct — vous pouvez continuer.':'Prête à passer à la suite ?');
  return '<div class="complete-zone" id="czone"><div class="cz-t">'+htxt+'</div>'+
    '<button class="btn solid" onclick="completeAndNext(\''+id+'\')">'+cta+'</button></div>';
}
/* re-render just the gate after a quiz is answered (without rebuilding the whole lesson) */
function refreshGate(){
  const z=document.getElementById('czone'); if(!z) return;
  z.outerHTML=renderGate(state.current);
}

/* complete button + prev/next */
function addCompleteZone(id){
  if(id==='certificate'||id==='welcome'){ return; }
  const c=document.getElementById('content');
  const idx=FLAT.indexOf(id);
  const prev=idx>0?FLAT[idx-1]:null, next=idx<FLAT.length-1?FLAT[idx+1]:null;
  let zone = COUNTED.includes(id) ? renderGate(id) : '';
  let nav='<div class="navlinks">';
  nav+= prev?'<button class="btn" onclick="go(\''+prev+'\')">←  Précédent</button>':'<span></span>';
  // forward button only appears once this lesson is complete (enforces order)
  if(state.done[id]){
    nav+= next?'<button class="btn gold" onclick="go(\''+next+'\')">Suivant  →</button>'
              :'<button class="btn gold" onclick="go(\'certificate\')">Voir votre certificat  →</button>';
  } else {
    nav+='<span></span>';
  }
  nav+='</div>';
  c.insertAdjacentHTML('beforeend',zone+nav);
}
function completeAndNext(id){
  state.done[id]=true; save();
  buildNav(); updateProgress();
  const allDone=COUNTED.every(x=>state.done[x]);
  const idx=FLAT.indexOf(id), next=idx<FLAT.length-1?FLAT[idx+1]:'certificate';
  if(allDone){ toast('Cours terminé ! Certificat débloqué ✦'); }
  else { toast('Leçon terminée 🌿'); }
  go(next);
}
function toggleDone(id){
  state.done[id]=!state.done[id]; save();
  buildNav(); updateProgress(); render(id);
}

/* ---- reflections ---- */
function hydrateReflections(){
  document.querySelectorAll('[data-reflect]').forEach(t=>{
    const k=t.dataset.reflect;
    if(t.value==='' && state.reflect[k]!=null) t.value=state.reflect[k];
    t.addEventListener('input',()=>{ state.reflect[k]=t.value; save();
      const s=document.querySelector('[data-saved="'+k+'"]'); if(s){s.classList.add('show'); clearTimeout(s._t); s._t=setTimeout(()=>s.classList.remove('show'),1200);}
      if(t.tagName==='TEXTAREA') refreshGate(); });
  });
}
/* ---- checklists ---- */
function toggleChk(id){ state.chk[id]=!state.chk[id]; save(); const li=document.querySelector('[data-chk="'+id+'"]'); if(li)li.classList.toggle('checked',state.chk[id]); }
function hydrateChecks(){ document.querySelectorAll('[data-chk]').forEach(li=>{ if(state.chk[li.dataset.chk]) li.classList.add('checked'); }); }
/* ---- tracker ---- */
function saveTrack(id,v){ state.track[id]=v; save(); }
function hydrateTracks(){ document.querySelectorAll('[data-trk]').forEach(i=>{ if(state.track[i.dataset.trk]!=null) i.value=state.track[i.dataset.trk]; }); }
/* ---- quizzes ---- */
function answerQuiz(qid,i,correct){
  const box=document.querySelector('[data-quiz="'+qid+'"]'); if(!box)return;
  if(state.quizPass[qid]) return;                 // already passed — locked
  state.quiz[qid]=i;
  const opts=box.querySelectorAll('.opt');
  opts.forEach(o=>o.classList.remove('correct','wrong'));
  const fb=box.querySelector('[data-fb="'+qid+'"]');
  const tryEl=box.querySelector('[data-try="'+qid+'"]');
  if(i===correct){
    state.quizPass[qid]=true; save();
    opts.forEach(o=>{ if(+o.dataset.i===correct)o.classList.add('correct'); });
    box.classList.add('passed');
    if(tryEl) tryEl.classList.remove('show');
    if(fb) fb.classList.add('show');
    toast('Correct ✓');
    refreshGate();                                // débloque le bouton Terminer
  } else {
    save();
    const opt=box.querySelector('.opt[data-i="'+i+'"]'); if(opt)opt.classList.add('wrong');
    if(fb) fb.classList.remove('show');
    if(tryEl) tryEl.classList.add('show');        // ask them to try again, without revealing the answer
    toast('Pas tout à fait — réessayez');
  }
}
function hydrateQuizzes(){
  document.querySelectorAll('[data-quiz]').forEach(box=>{
    const qid=box.dataset.quiz;
    if(state.quizPass[qid]){
      const opt=box.querySelector('.opt[data-i="'+state.quiz[qid]+'"]');
      const m=opt&&opt.getAttribute('onclick').match(/answerQuiz\('[^']+',\d+,(\d+)\)/);
      const correct=m?+m[1]:-1;
      box.querySelectorAll('.opt').forEach(o=>{ if(+o.dataset.i===correct)o.classList.add('correct'); });
      box.classList.add('passed');
      const fb=box.querySelector('[data-fb="'+qid+'"]'); if(fb)fb.classList.add('show');
    }
  });
}

/* ---- menu / toast / reset ---- */
function toggleMenu(){ document.body.classList.toggle('menu-open'); }
function closeMenu(){ document.body.classList.remove('menu-open'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400); }
function resetCourse(){
  if(!confirm('Réinitialiser toute la progression, les réflexions, les cases et les suivis ? Cette action est irréversible.')) return;
  state={done:{},reflect:{},chk:{},track:{},quiz:{},quizPass:{},current:'welcome'};
  localStorage.removeItem(KEY); buildNav(); updateProgress(); render('welcome'); toast('Progression réinitialisée');
}
