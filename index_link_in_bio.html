      { id:'t4', on:true, stars:5, author:'Fatoumata D.',
        text_fr:"J'ai enfin compris ma porosité. Tout fait sens maintenant !",
        text_en:'Finally understood my porosity. Everything clicked!' }
    ]
  },
  social: {
    on: true,

    items: [
      { id:'facebook', on:true, icon:'📘',
        label_fr:'Facebook', label_en:'Facebook',
        sub_fr:'Conseils & coulisses', sub_en:'Daily tips & real talk',
        url:'https://www.facebook.com/schicgirl' },
      { id:'email', on:true, icon:'✉️',
        label_fr:"M'Écrire", label_en:'Email Me',

};

/* ── STORAGE & MERGE ── */
function loadSite() {
  let s = null;
  try { s = JSON.parse(localStorage.getItem(SITE_KEY) || 'null'); } catch {}
  if (!s) return JSON.parse(JSON.stringify(DEFAULT_SITE));
  return deepMerge(JSON.parse(JSON.stringify(DEFAULT_SITE)), s);
}
function deepMerge(base, over) {
  if (Array.isArray(over)) return over;
  if (over && typeof over === 'object' && !Array.isArray(over)) {
    const out = { ...base };
    for (const k in over) {
      out[k] = (k in base && typeof base[k] === 'object' && base[k] !== null && !Array.isArray(base[k]))
        ? deepMerge(base[k], over[k]) : over[k];
    }
    return out;
  }
  return over;
}

let SITE = loadSite();
let LANG = 'fr';

/* ── ONE-SHOT IMAGE PATH MIGRATION ──
   For users who already had a saved config with bare filenames (e.g. 'amazon.png'),
   prefix anything that's not a URL / data URL / absolute path / already-assets-prefixed
   with 'assets/'. Then save back so this only runs once per stale entry. */
function migrateImagePaths() {
  let changed = false;
  const fix = p => {
    if (!p || typeof p !== 'string') return p;
    if (/^(https?:|data:|mailto:|tel:|\/)/i.test(p)) return p;
    if (p.startsWith('assets/')) return p;
    changed = true;
    return 'assets/' + p;
  };
  if (SITE.brand) SITE.brand.logo = fix(SITE.brand.logo);
  if (SITE.hero && Array.isArray(SITE.hero.icons)) SITE.hero.icons = SITE.hero.icons.map(fix);
  if (SITE.shop) SITE.shop.img = fix(SITE.shop.img);
  if (SITE.amazon && Array.isArray(SITE.amazon.items)) SITE.amazon.items.forEach(it => { it.img = fix(it.img); });
  if (changed) { try { localStorage.setItem(SITE_KEY, JSON.stringify(SITE)); } catch {} }
}
migrateImagePaths();

/* ── UTILS ── */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function safeUrl(u) {
  const s = String(u||'').trim();
  if (!s) return '#';
  if (s.startsWith('#') || s.startsWith('/') || s.startsWith('?')) return s;
  if (/^(https?:|mailto:|tel:)/i.test(s)) return s;
  return '#';
}
function tx(o, key) { return o[key+'_'+LANG] || o[key+'_fr'] || o[key] || ''; }

/* ── RENDER ── */
function render() {
  const w = document.getElementById('wrap');
  w.innerHTML = renderHero() + renderGifts() + renderShop() + renderTools() + renderAmazon() + renderTestimonials() + renderSocial() + renderFooter();
  const wm = document.getElementById('wm');
  if (SITE.brand.watermark) { wm.textContent = SITE.brand.watermark; wm.style.display = ''; }
  else wm.style.display = 'none';
}

function renderHero() {
  const b = SITE.brand, h = SITE.hero;
  const stats = (h.stats||[]).filter(s => s.on).map(s =>
    `<div class="stat-pill"><div class="stat-dot"></div><span>${esc(tx(s,'text'))}</span></div>`).join('');
  const icons = (h.icons||[]).filter(Boolean).map(u =>
    `<div class="icon-chip"><img src="${esc(u)}" alt="" onerror="this.style.display='none'"/></div>`).join('');
  const firstChar = esc((b.name_pre || 'S').charAt(0));
  const logo = b.logo
    ? `<img class="logo-img" src="${esc(b.logo)}" alt="${esc(b.name_pre+b.name_acc)}" onerror="var p=this.parentElement;p.innerHTML='<div class=&quot;logo-fb&quot;>${firstChar}</div>'"/>`
    : `<div class="logo-fb">${firstChar}</div>`;
  return `
  <div class="hero">
    <div class="logo-ring">${logo}</div>
    <h1 class="brand-name">${esc(b.name_pre)}<span>${esc(b.name_acc)}</span>${esc(b.name_suf||'')}</h1>
    <p class="brand-tagline">${esc(tx(b,'tagline'))}</p>
    ${icons ? `<div class="icon-row">${icons}</div>` : ''}
    ${stats ? `<div class="stat-row">${stats}</div>` : ''}
  </div>`;
}

function renderGifts() {
  const g = SITE.gifts;
  if (!g || !g.on) return '';
  const items = (g.items||[]).filter(i => i.on).map(i => {
    const url = LANG === 'fr' ? (i.url_fr||i.url_en) : (i.url_en||i.url_fr);
    return `<a href="${esc(safeUrl(url))}" class="gift-card" onclick="trackClick('gift-${i.id}-${LANG}')">
      <div class="gift-wrap-icon">${esc(i.emoji||'🎁')}</div>
      <div>
        <div class="gift-label">${esc(tx(i,'label'))}</div>
        <div class="gift-title">${esc(tx(i,'title'))}</div>
        <div class="gift-sub">${esc(tx(i,'sub'))}</div>
      </div>
    </a>`;
  }).join('');
  if (!items) return '';
  return `<div class="section"><div class="section-label">✦ ${esc(tx(g,'label'))}</div>${items}</div>`;
}

function renderShop() {
  const s = SITE.shop;
  if (!s || !s.on) return '';
  const fb = esc(s.img_fallback || '📚');
  const imgHtml = s.img
    ? `<img src="${esc(s.img)}" alt="" onerror="var p=this.parentElement;p.innerHTML='${fb}'"/>`
    : fb;
  return `<div class="section">
    <div class="section-label">✦ ${esc(tx(s,'label'))}</div>
    <a href="${esc(safeUrl(s.url))}" class="shop-card" onclick="trackClick('${esc(s.track||'selar-shop')}')">
      <div class="shop-img-wrap">${imgHtml}</div>
      <div class="shop-body">
        <span class="shop-eyebrow">${esc(tx(s,'eyebrow'))}</span>
        <div class="shop-title">${esc(tx(s,'title'))}</div>
        <div class="shop-desc">${esc(tx(s,'desc'))}</div>
        <span class="shop-cta">${esc(tx(s,'cta'))}</span>
      </div>
    </a>
  </div>`;
}

function renderTools() {
  const t = SITE.tools;
  if (!t || !t.on) return '';
  const items = (t.items||[]).filter(i => i.on && (i.lang === 'both' || i.lang === LANG)).map(i => {
    if (i.style === 'feature') {
      return `<a href="${esc(safeUrl(i.url))}" class="diag-card" onclick="trackClick('${esc(i.id)}')">
        <div class="diag-inner">
          <div class="diag-icon-wrap">${esc(i.icon||'💬')}</div>
          <div>
            ${i.label_fr||i.label_en ? `<div class="diag-label">${esc(tx(i,'label'))}</div>` : ''}
            <div class="diag-title">${esc(tx(i,'title'))}</div>
            <div class="diag-sub">${esc(tx(i,'sub'))}</div>
          </div>
        </div>
      </a>`;
    }
    const badge = i.badge ? `<span class="badge-pill">${esc(i.badge)}</span>` : '';
    return `<a href="${esc(safeUrl(i.url))}" class="link-card" onclick="trackClick('${esc(i.id)}')">
      <div class="link-icon">${esc(i.icon||'🔗')}</div>
      <div class="link-body">
        <div class="link-title">${esc(tx(i,'title'))}</div>
        <div class="link-sub">${esc(tx(i,'sub'))}</div>
      </div>
      <div class="link-right">${badge}<span class="link-arrow">→</span></div>
    </a>`;
  }).join('');
  if (!items) return '';
  return `<div class="section"><div class="section-label">✦ ${esc(tx(t,'label'))}</div>${items}</div>`;
}

function renderAmazon() {
  const a = SITE.amazon;
  if (!a || !a.on) return '';
  const items = (a.items||[]).filter(i => i.on).map(i => {
    const emoji = i.emoji || '';
    const fb = esc(emoji);
    let wrap = '';
    if (i.img) {
      // If image fails: fall back to emoji if set, otherwise hide the wrapper entirely
      const onerr = emoji
        ? `var p=this.parentElement;p.innerHTML='${fb}'`
        : `this.parentElement.style.display='none'`;
      wrap = `<div class="stan-img-wrap"><img src="${esc(i.img)}" alt="" onerror="${onerr}"/></div>`;
    } else if (emoji) {
      wrap = `<div class="stan-img-wrap">${fb}</div>`;
    }
    // else: no image and no emoji → no wrapper at all, card reflows
    return `<a href="${esc(safeUrl(i.url))}" class="stan-card" onclick="trackClick('${esc(i.id)}')">
      ${wrap}
      <div class="stan-body">
        <div class="stan-eyebrow">${esc(tx(i,'eyebrow'))}</div>
        <div class="stan-name">${esc(tx(i,'name'))}</div>
        <div class="stan-desc">${esc(tx(i,'desc'))}</div>
      </div>
      <div class="stan-cta">${esc(tx(i,'cta'))}</div>
    </a>`;
  }).join('');
  if (!items) return '';
  return `<div class="section"><div class="section-label">✦ ${esc(tx(a,'label'))}</div><div class="stan-store">${items}</div></div>`;
}

function renderTestimonials() {
  const t = SITE.testimonials;
  if (!t || !t.on) return '';
  const items = (t.items||[]).filter(i => i.on).map(i => `
    <div class="testi-card">
      <div class="testi-stars">${'★'.repeat(Math.max(0,Math.min(5, i.stars||5)))}</div>
      <p class="testi-text">${esc(tx(i,'text'))}</p>
      <div class="testi-author">— ${esc(i.author||'')}</div>
    </div>`).join('');
  if (!items) return '';
  return `<div class="section"><div class="section-label">✦ ${esc(tx(t,'label'))}</div><div class="testi-scroll">${items}</div></div>`;
}

function renderSocial() {
  const s = SITE.social;
  if (!s || !s.on) return '';
  const items = (s.items||[]).filter(i => i.on).map(i => {
    const iconHtml = i.icon ? `<span class="social-icon">${esc(i.icon)}</span>` : '';
    return `
    <a href="${esc(safeUrl(i.url))}" class="social-btn" onclick="trackClick('${esc(i.id)}')">
      ${iconHtml}
      <div>
        <div class="social-label">${esc(tx(i,'label'))}</div>
        <div class="social-sub">${esc(tx(i,'sub'))}</div>
      </div>
    </a>`;
  }).join('');
  if (!items) return '';
  return `<div class="section"><div class="section-label">✦ ${esc(tx(s,'label'))}</div><div class="social-row">${items}</div></div>`;
}

function renderFooter() {
  const f = SITE.footer, b = SITE.brand;
  const logo = f.logo_show && b.logo
    ? `<img src="${esc(b.logo)}" alt="" style="width:36px;height:36px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;opacity:.7;" onerror="this.style.display='none'"/>`
    : '';
  return `
    <div class="footer">
      <div class="footer-divider"></div>
      ${logo}
      <strong>${esc(f.brand||'Schicgirl™')}</strong><br/>
      <span>${tx(f,'disc')}</span>
    </div>`;
}

/* ── LANGUAGE ── */
function setLang(lang) {
  LANG = lang;
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.getElementById('btnFr').classList.toggle('active', lang === 'fr');
  document.documentElement.lang = lang;
  try { localStorage.setItem('sg_lang', lang); } catch {}
  render();
}

/* ── ANALYTICS ── */
function getData() {
  try { return JSON.parse(localStorage.getItem(ANALYTICS_KEY) || '{"visits":[],"clicks":[]}'); }
  catch { return { visits: [], clicks: [] }; }
}
function saveData(d) { try { localStorage.setItem(ANALYTICS_KEY, JSON.stringify(d)); } catch {} }

function trackClick(value) {
  const d = getData();
  d.clicks.unshift({ ts: Date.now(), value });
  if (d.clicks.length > MAX_CLICKS) d.clicks.length = MAX_CLICKS;
  saveData(d);
}

function trackVisit() {
  const d = getData();
  d.visits.unshift({
    ts: Date.now(),
    lang: LANG,
    ref: document.referrer,
    mob: /Mobi|Android/i.test(navigator.userAgent),
    tz: Intl.DateTimeFormat().resolvedOptions().timeZone || ''
  });
  if (d.visits.length > MAX_VISITS) d.visits.length = MAX_VISITS;
  saveData(d);
}

/* ── COPY PROTECTION ── */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  const blocked = ((e.ctrlKey || e.metaKey) && ['s','p','a','c','u'].includes(e.key.toLowerCase())) || e.key === 'F12';
  if (blocked) e.preventDefault();
});
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());

/* ── LIVE SYNC: re-render if admin edits while tab is open ── */
window.addEventListener('storage', e => {
  if (e.key === SITE_KEY) { SITE = loadSite(); render(); }
});

/* ── BOOT ── */
const saved = localStorage.getItem('sg_lang');
if (saved === 'fr' || saved === 'en') LANG = saved;
document.getElementById('btnEn').classList.toggle('active', LANG === 'en');
document.getElementById('btnFr').classList.toggle('active', LANG === 'fr');
document.documentElement.lang = LANG;
render();
trackVisit();
</script>
